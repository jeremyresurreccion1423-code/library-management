spring.config.import=optional:classpath:application-local.properties

# Supabase PostgreSQL — same database as Attendance (override via application-local.properties or env vars)
spring.datasource.url=${SUPABASE_DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# Supabase Session Pooler (PgBouncer) — disable server-side prepared statements
spring.datasource.hikari.data-source-properties.prepareThreshold=0
spring.jpa.properties.hibernate.jdbc.use_server_prep_stmts=false

# Connection pool (Session Pooler — keep small; Attendance shares the same Supabase limit)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=LibrarySessionPool

# JPA / Hibernate — schema managed by database/*.sql scripts (Phase 3 shared auth)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.open-in-view=false
# Library tables live in library schema; User entity explicitly maps to public.users
spring.jpa.properties.hibernate.default_schema=library

# Production defaults (override in application-local.properties for dev)
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}
library.seed-enabled=${LIBRARY_SEED_ENABLED:false}
library.startup-maintenance-enabled=${LIBRARY_STARTUP_MAINTENANCE:false}

server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

spring.web.resources.cache.cachecontrol.max-age=86400

logging.level.org.hibernate=WARN
logging.level.org.springframework.web=WARN

server.port=${PORT:8080}
server.error.whitelabel.enabled=false

server.servlet.session.timeout=20m

# ---------------------------------------------------------------------------
# LU Centralized System — Brevo SMTP (shared with Attendance Management)
# Password: set MAIL_PASSWORD or BREVO_SMTP_PASSWORD (never commit secrets)
# ---------------------------------------------------------------------------
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:b20400001@smtp-brevo.com}
spring.mail.password=${MAIL_PASSWORD:${BREVO_SMTP_PASSWORD:}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=20000
spring.mail.properties.mail.smtp.timeout=20000
spring.mail.properties.mail.smtp.writetimeout=20000
central.mail.from-name=LU Centralized System
central.mail.from-email=edulibrary67@gmail.com
# Railway Hobby blocks SMTP — set BREVO_API_KEY (HTTPS). SMTP still works locally / Pro.
central.mail.brevo-api-key=${BREVO_API_KEY:}
library.mail.from=edulibrary67@gmail.com
library.otp-expiry-minutes=5
library.reminder.days-before-due=2
# Base URL of Attendance app (Railway: set ATTENDANCE_APP_URL to your Attendance service URL, no trailing slash)
library.attendance-app-url=${ATTENDANCE_APP_URL:http://localhost:8081}

# Super Admin cross-system SSO shared secret (set the SAME value on the Attendance app; override via env var in prod)
super-admin.sso-secret=${SUPER_ADMIN_SSO_SECRET:dev-only-change-me}

# Borrowing: days until due, default fine per overdue day when book has no custom fine (PHP)
library.loan-days=14
library.fine-per-day=5.00

# File uploads (e-books) — local disk; can move to Supabase Storage later
library.upload-dir=${user.home}/smart-library-uploads/ebooks
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB
