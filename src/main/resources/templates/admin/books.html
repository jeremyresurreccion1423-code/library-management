<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Books')}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
  <main class="dashboard-main">
    <div class="dashboard-header">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1 class="dashboard-title">Books</h1>
          <p class="dashboard-subtitle">Manage library collection</p>
        </div>
        <a class="btn btn-accent" th:href="@{/admin/books/new}">
          <i class="bi bi-plus-lg me-1"></i>Add book
        </a>
      </div>
    </div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

  <div class="card-lib p-3 mb-3">
    <form method="get" th:action="@{/admin/books}">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Keyword</label>
          <input class="form-control" name="q" th:value="${q}" placeholder="Search by title, ISBN, or barcode..."/>
        </div>
        <div class="col-md-3">
          <label class="form-label">Category</label>
          <select class="form-select" name="categoryId">
            <option value="">All</option>
            <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                    th:selected="${categoryId == c.id}"></option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Author</label>
          <select class="form-select" name="authorId">
            <option value="">Any</option>
            <option th:each="a : ${authors}" th:value="${a.id}" th:text="${a.name}"
                    th:selected="${authorId == a.id}"></option>
          </select>
        </div>
        <div class="col-md-2 d-flex align-items-end">
          <button type="submit" class="btn btn-accent w-100">
            <i class="bi bi-search me-1"></i>Search
          </button>
        </div>
      </div>
    </form>
  </div>

  <div class="card-lib p-3 mb-3" th:if="${!#lists.isEmpty(books)}">
    <div class="d-flex flex-wrap gap-2 align-items-center">
      <span class="text-muted-lib small me-1"><i class="bi bi-funnel me-1"></i>Filter:</span>
      <button type="button" class="btn btn-sm btn-accent category-filter active" data-category="">All</button>
      <button type="button" class="btn btn-sm btn-outline-secondary category-filter"
              th:each="c : ${categories}" th:attr="data-category=${c.name}" th:text="${c.name}"></button>
    </div>
  </div>

  
  <div class="books-grid" id="booksGrid">
    <div class="book-card" th:each="b : ${books}" th:attr="data-category=${b.category != null ? b.category.name : ''}">
      <div class="book-card-header">
        <div class="book-icon">
          <i class="bi bi-book"></i>
        </div>
        <div class="book-status" th:classappend="${b.availableCopies > 0 ? 'available' : 'unavailable'}">
          <span th:text="${b.availableCopies + '/' + b.totalCopies}"></span>
        </div>
      </div>
      <div class="book-card-body">
        <h5 class="book-title" th:text="${b.title}">Book Title</h5>
        <div class="book-details">
          <p class="book-isbn" th:if="${b.isbn != null && !b.isbn.isEmpty()}">
            <i class="bi bi-upc"></i>
            <span th:text="${b.isbn}"></span>
          </p>
          <p class="book-barcode" th:if="${b.barcode != null && !b.barcode.isEmpty()}">
            <i class="bi bi-qr-code"></i>
            <span th:text="${b.barcode}"></span>
          </p>
          <p class="book-fine small mb-0">
            <i class="bi bi-cash-coin"></i>
            Fine:
            <strong th:if="${b.finePerDay != null}" th:text="${'₱' + b.finePerDay + '/day'}"></strong>
            <span th:if="${b.finePerDay == null}" th:text="${'₱' + defaultFinePerDay + '/day (default)'}"></span>
          </p>
        </div>
      </div>
      <div class="book-card-footer">
        <a class="btn btn-sm btn-outline-success" th:if="${b.ebook != null}" th:href="@{/ebook/read/{id}(id=${b.id})}" target="_blank">
          <i class="bi bi-file-earmark-pdf"></i> View PDF
        </a>
        <a class="btn btn-sm btn-outline-primary" th:href="@{/admin/books/{id}/edit(id=${b.id})}">
          <i class="bi bi-pencil"></i> Edit
        </a>
        <button class="btn btn-sm btn-outline-danger delete-book-btn" type="button"
                th:attr="data-book-id=${b.id},data-book-title=${b.title}">
          <i class="bi bi-trash"></i> Delete
        </button>
      </div>
    </div>
  </div>
  
  
  <div class="empty-state" th:if="${#lists.isEmpty(books)}">
    <i class="bi bi-inbox"></i>
    <p>No books found in the library.</p>
  </div>
  </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/admin-sidebar :: sidebar-script}"></div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const deleteButtons = document.querySelectorAll('.delete-book-btn');
    deleteButtons.forEach(function(button) {
      button.addEventListener('click', function() {
        const bookId = button.getAttribute('data-book-id');
        const bookTitle = button.getAttribute('data-book-title');
        const message = 'Delete "' + bookTitle + '"? This action cannot be undone and related records may be affected.';

        const submitDelete = function() {
          const form = document.createElement('form');
          form.method = 'post';
          form.action = '/admin/books/' + bookId + '/delete';

          const csrfToken = document.querySelector('meta[name="_csrf"]');
          if (csrfToken) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = '_csrf';
            input.value = csrfToken.getAttribute('content');
            form.appendChild(input);
          }

          document.body.appendChild(form);
          form.submit();
        };

        if (typeof confirmAction === 'function') {
          confirmAction(message, { type: 'danger', title: 'Confirm Delete', okText: 'Yes, Delete' }, submitDelete);
        } else if (confirm(message)) {
          submitDelete();
        }
      });
    });

    // Category filter
    document.querySelectorAll('.category-filter').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.category-filter').forEach(b => {
          b.classList.remove('btn-accent', 'active');
          b.classList.add('btn-outline-secondary');
        });
        this.classList.remove('btn-outline-secondary');
        this.classList.add('btn-accent', 'active');
        const cat = this.dataset.category;
        document.querySelectorAll('.book-card').forEach(card => {
          if (!cat || card.dataset.category === cat) {
            card.style.display = '';
          } else {
            card.style.display = 'none';
          }
        });
      });
    });
  });
</script>
</body>
</html>
