<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Books')}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
  <main class="dashboard-main">
    <div class="el-page-header">
      <div>
        <h1>Books</h1>
        <p>Manage and organize the library collection</p>
      </div>
      <a class="el-btn-primary" th:href="@{/admin/books/new}">
        <i class="bi bi-plus-lg"></i> Add Book
      </a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="el-panel el-books-filter">
      <form method="get" th:action="@{/admin/books}" class="el-filter-form">
        <input type="hidden" name="statusFilter" th:value="${statusFilter}"/>
        <div class="el-filter-row">
          <div class="el-filter-field el-filter-field--grow">
            <label for="bookSearch">Search</label>
            <div class="el-input-icon-wrap">
              <i class="bi bi-search"></i>
              <input id="bookSearch" class="el-input" name="q" th:value="${q}"
                     placeholder="Search by title, ISBN, or barcode..."/>
            </div>
          </div>
          <div class="el-filter-field">
            <label for="bookCategory">Category</label>
            <select id="bookCategory" class="el-select" name="categoryId">
              <option value="">All Categories</option>
              <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                      th:selected="${categoryId == c.id}"></option>
            </select>
          </div>
          <div class="el-filter-field">
            <label for="bookAuthor">Author</label>
            <select id="bookAuthor" class="el-select" name="authorId">
              <option value="">All Authors</option>
              <option th:each="a : ${authors}" th:value="${a.id}" th:text="${a.name}"
                      th:selected="${authorId == a.id}"></option>
            </select>
          </div>
          <div class="el-filter-actions">
            <button type="submit" class="el-btn-primary el-btn-sm">
              <i class="bi bi-search"></i> Search
            </button>
            <a th:href="@{/admin/books}" class="el-btn-ghost el-btn-sm">
              <i class="bi bi-arrow-counterclockwise"></i> Reset
            </a>
          </div>
        </div>
      </form>

      <div class="el-status-pills">
        <span class="el-status-pills-label"><i class="bi bi-funnel"></i> Quick filters</span>
        <a th:href="@{/admin/books(q=${q}, categoryId=${categoryId}, authorId=${authorId}, statusFilter='all')}"
           class="el-pill" th:classappend="${statusFilter == 'all'} ? ' active'">All</a>
        <a th:href="@{/admin/books(q=${q}, categoryId=${categoryId}, authorId=${authorId}, statusFilter='available')}"
           class="el-pill el-pill--available" th:classappend="${statusFilter == 'available'} ? ' active'">Available</a>
        <a th:href="@{/admin/books(q=${q}, categoryId=${categoryId}, authorId=${authorId}, statusFilter='borrowed')}"
           class="el-pill el-pill--borrowed" th:classappend="${statusFilter == 'borrowed'} ? ' active'">Borrowed</a>
        <a th:href="@{/admin/books(q=${q}, categoryId=${categoryId}, authorId=${authorId}, statusFilter='unavailable')}"
           class="el-pill el-pill--maintenance" th:classappend="${statusFilter == 'unavailable'} ? ' active'">Unavailable</a>
      </div>
    </div>

    <div class="el-panel el-books-grid-panel">
      <div class="el-books-grid-head" th:if="${!#lists.isEmpty(books)}">
        <span th:text="${'Showing ' + bookCount + ' book' + (bookCount == 1 ? '' : 's')}">Showing 0 books</span>
      </div>
      <div class="sl-book-grid" th:if="${!#lists.isEmpty(books)}">
        <th:block th:each="b : ${books}">
          <div th:replace="~{fragments/book-card :: admin(${b})}"></div>
        </th:block>
      </div>
      <div class="sl-book-grid-empty" th:if="${#lists.isEmpty(books)}">
        <i class="bi bi-inbox"></i>
        <p>No books found. Try adjusting your filters or add a new book.</p>
      </div>
    </div>
  </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/admin-sidebar :: sidebar-script}"></div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    document.querySelectorAll('.delete-book-btn').forEach(function(button) {
      button.addEventListener('click', function() {
        const bookId = button.getAttribute('data-book-id');
        const bookTitle = button.getAttribute('data-book-title');
        const message = 'Delete "' + bookTitle + '"? This action cannot be undone.';

        const submitDelete = function() {
          const form = document.createElement('form');
          form.method = 'post';
          form.action = '/admin/books/' + bookId + '/delete';
          const csrfToken = document.querySelector('meta[name="_csrf"]');
          if (csrfToken) {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = '_csrf';
            input.value = csrfToken.getAttribute('content');
            form.appendChild(input);
          }
          document.body.appendChild(form);
          form.submit();
        };

        if (typeof confirmAction === 'function') {
          confirmAction(message, { type: 'danger', title: 'Confirm Delete', okText: 'Yes, Delete' }, submitDelete);
        } else if (confirm(message)) {
          submitDelete();
        }
      });
    });
  });
</script>
</body>
</html>
