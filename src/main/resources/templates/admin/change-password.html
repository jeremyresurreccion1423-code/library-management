<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Change password')}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
  <main class="dashboard-main">
      <div class="dashboard-header text-center">
      <h1 class="dashboard-title">Change Password</h1>
      <p class="dashboard-subtitle">Update your account password</p>
    </div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="profile-card">
      <div class="profile-card-header">
        <div class="profile-avatar" style="width:56px;height:56px;font-size:1.4rem;">
          <i class="bi bi-shield-lock"></i>
        </div>
        <div class="profile-info">
          <h4>Security Settings</h4>
          <p>Update your password</p>
        </div>
      </div>

      <form th:action="@{/admin/account/password}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
          <label class="form-label">Current Password</label>
          <input class="form-control" id="currentPassword" type="password" name="currentPassword" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input class="form-control" id="newPassword" type="password" name="newPassword" required minlength="6"/>
        </div>
        <div class="mb-3 form-check">
          <input class="form-check-input" type="checkbox" id="toggleAdminPasswords"/>
          <label class="form-check-label" for="toggleAdminPasswords">Show passwords</label>
        </div>
        <div class="profile-actions">
          <button class="btn btn-accent" type="submit">
            <i class="bi bi-check-lg me-1"></i>Update Password
          </button>
          <a class="btn btn-outline-light" th:href="@{/admin}">
            <i class="bi bi-arrow-left me-1"></i>Back
          </a>
        </div>
      </form>
    </div>
  </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/admin-sidebar :: sidebar-script}"></div>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const currentInput = document.getElementById('currentPassword');
    const newInput = document.getElementById('newPassword');
    const toggle = document.getElementById('toggleAdminPasswords');
    if (!currentInput || !newInput || !toggle) return;
    toggle.addEventListener('change', function () {
      const inputType = this.checked ? 'text' : 'password';
      currentInput.type = inputType;
      newInput.type = inputType;
    });
  });
</script>
</body>
</html>
