<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Profile')}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
  <main class="dashboard-main">
    <div class="pd-page pd-page--edit">

      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <section class="pd-card pd-card--edit">
        <div class="pd-card__head">
          <i class="bi bi-person-gear"></i>
          <h3>My Profile</h3>
        </div>

        <div class="pd-photo-row">
          <div class="pd-photo-row__avatar">
            <img th:if="${profilePhotoUrl != null}"
                 th:src="${profilePhotoUrl}"
                 alt="Profile photo"
                 width="72"
                 height="72"/>
            <span th:unless="${profilePhotoUrl != null}" th:text="${profileInitial ?: 'U'}">U</span>
          </div>
          <form th:action="@{/admin/profile/photo}" method="post" enctype="multipart/form-data" class="pd-photo-row__form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <label class="form-label">Profile Photo</label>
            <div class="pd-photo-row__inputs">
              <input type="file" name="photo" accept="image/*" class="form-control" required>
              <button type="submit" class="pd-btn pd-btn--primary">
                <i class="bi bi-upload"></i> Upload
              </button>
            </div>
            <div class="form-text text-muted">JPG, PNG, GIF, or WebP. Max 5MB.</div>
          </form>
        </div>

        <hr class="pd-divider"/>

        <form th:action="@{/admin/profile}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="mb-3">
            <label class="form-label"><i class="bi bi-at me-1"></i> Username</label>
            <input type="text" class="form-control" name="username"
                   th:value="${username}" required
                   pattern="[A-Za-z0-9_-]+"
                   placeholder="Username"
                   title="Only letters, numbers, underscore, and hyphen allowed."/>
            <div class="form-text text-muted">Letters, numbers, underscore, and hyphen only.</div>
          </div>
          <div class="pd-actions">
            <button type="submit" class="pd-btn pd-btn--primary">
              <i class="bi bi-check-lg"></i> Save Changes
            </button>
            <a class="pd-btn pd-btn--ghost" th:href="${dashboardPath}">
              <i class="bi bi-arrow-left"></i> Back
            </a>
          </div>
        </form>
      </section>
    </div>
  </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/admin-sidebar :: sidebar-script}"></div>
</body>
</html>
