<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Profile')}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
  <main class="dashboard-main">
    <div class="dashboard-header">
      <h1 class="dashboard-title">My Profile</h1>
      <p class="dashboard-subtitle">Admin account information</p>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="profile-card">
      <div class="profile-card-header">
        <div class="profile-avatar">
          <img th:if="${profilePhotoUrl != null}" th:src="${profilePhotoUrl}" alt="Profile photo" class="profile-avatar-img"/>
          <span th:if="${profilePhotoUrl == null}" th:text="${profileInitial ?: 'U'}">U</span>
        </div>
        <div class="profile-info">
          <h4 th:text="${fullName} ?: ${username}">Admin</h4>
          <p>Administrator Account</p>
        </div>
      </div>

      <div class="profile-photo-upload mb-4">
        <label class="form-label">Profile Photo</label>
        <form th:action="@{/admin/profile/photo}" method="post" enctype="multipart/form-data" class="d-flex flex-wrap gap-2 align-items-center">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="file" name="photo" accept="image/*" class="form-control" style="max-width:320px;" required>
          <button type="submit" class="btn btn-accent btn-sm">
            <i class="bi bi-upload me-1"></i>Upload Photo
          </button>
        </form>
        <div class="form-text text-muted">JPG, PNG, GIF, or WebP. Max 5MB.</div>
      </div>

      <form th:action="@{/admin/profile}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
          <label class="form-label">Username <span class="text-danger">*</span></label>
          <input type="text" class="form-control" name="username" id="username"
                 th:value="${username}" required
                 pattern="[A-Za-z0-9_-]+"
                 placeholder="Enter username (letters, numbers, underscore, hyphen)"
                 title="Only letters, numbers, underscore, and hyphen allowed. No spaces or special characters."/>
          <div class="form-text text-muted">Letters, numbers, underscore, and hyphen only. No spaces.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Role</label>
          <input type="text" class="form-control" value="Administrator" readonly style="background:#f8fafc;"/>
        </div>
        <div class="profile-actions">
          <button type="submit" class="btn btn-accent">
            <i class="bi bi-check-lg me-1"></i>Save Changes
          </button>
          <a class="btn btn-outline-light" th:href="@{/admin}">
            <i class="bi bi-arrow-left me-1"></i>Back
          </a>
        </div>
      </form>
    </div>
  </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/admin-sidebar :: sidebar-script}"></div>
</body>
</html>
