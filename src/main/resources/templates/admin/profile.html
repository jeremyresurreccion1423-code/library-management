<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Profile')}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
  <main class="dashboard-main">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="profile-topbar">
      <h2 class="profile-topbar-title">Profile Dashboard</h2>
      <div class="profile-topbar-actions">
        <div th:replace="~{fragments/profile-widget :: widget(photoAction=@{/admin/profile/photo}, passwordAction=@{/admin/account/password}, roleLabel=${roleLabel}, panelId='admin-profile-widget', logoutMode=${logoutMode})}"></div>
      </div>
    </div>

    <div class="profile-dashboard-grid profile-dashboard-grid-single">
      <section class="profile-main-column">
        <div class="profile-main-header ams-card">
          <h2>My Profile</h2>
          <small th:text="${roleName + ' INFORMATION'}">USER INFORMATION</small>
        </div>

        <div class="profile-hero ams-card">
          <div class="profile-hero-avatar">
            <img th:if="${profilePhotoUrl != null}" th:src="${profilePhotoUrl}" alt="Profile photo"/>
            <span th:unless="${profilePhotoUrl != null}" th:text="${profileInitial ?: 'U'}">U</span>
          </div>
          <h3 th:text="${displayName}">User Name</h3>
          <span class="profile-badge" th:text="${profileCode}">CODE</span>
        </div>

        <div class="ams-card">
          <h3>Personal Details</h3>
          <table class="ams-profile-table">
            <tbody>
              <tr th:each="entry : ${profileDetails}">
                <th th:text="${entry.key}">Label</th>
                <td th:text="${entry.value}">Value</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="ams-card">
          <h3>Profile Settings</h3>
          <div class="ams-form-row">
            <div>
              <h4 class="ams-settings-heading">Upload Photo</h4>
              <form th:action="@{/admin/profile/photo}" method="post" enctype="multipart/form-data">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group mb-2">
                  <input type="file" name="photo" class="form-control" accept="image/*" required>
                </div>
                <button type="submit" class="btn btn-ams-primary">Upload</button>
              </form>
            </div>
            <div>
              <h4 class="ams-settings-heading">Change Password</h4>
              <form th:action="@{/admin/account/password}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group mb-2">
                  <input type="password" name="currentPassword" class="form-control" placeholder="Current Password" required>
                </div>
                <div class="form-group mb-2">
                  <input type="password" name="newPassword" class="form-control" placeholder="New Password" required>
                </div>
                <div class="form-group mb-2">
                  <input type="password" name="confirmPassword" class="form-control" placeholder="Confirm Password" required>
                </div>
                <button type="submit" class="btn btn-ams-primary">Save Password</button>
              </form>
              <p class="mt-2 mb-0">
                <a th:href="@{/forgot-password}">Forgot password? Verify via OTP</a>
              </p>
            </div>
            <div>
              <h4 class="ams-settings-heading">Update Username</h4>
              <form th:action="@{/admin/profile}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <div class="form-group mb-2">
                  <input type="text" class="form-control" name="username"
                         th:value="${username}" required
                         pattern="[A-Za-z0-9_-]+"
                         placeholder="Username"
                         title="Only letters, numbers, underscore, and hyphen allowed."/>
                </div>
                <button type="submit" class="btn btn-ams-primary">Save Username</button>
              </form>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/admin-sidebar :: sidebar-script}"></div>
</body>
</html>
