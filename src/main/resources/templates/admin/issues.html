<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Issue / Return')}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
  <main class="dashboard-main">
    <div class="dashboard-header">
      <h1 class="dashboard-title">Issue / Return</h1>
      <p class="dashboard-subtitle">Manage book loans and returns</p>
    </div>
  <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div class="card-lib p-4 mb-4">
    <form class="row g-2 align-items-end" th:action="@{/admin/issues/issue}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="col-md-5">
        <label class="form-label">Book</label>
        <select class="form-select" name="bookId" required>
          <option th:each="b : ${books}" th:value="${b.id}"
                  th:text="${b.title + ' (' + b.availableCopies + ' avail)'}"
                  th:selected="${selectedBookId != null and selectedBookId == b.id}"></option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Student ID o username</label>
        <input class="form-control" name="studentId" required placeholder="STU2026..."/>
      </div>
      <div class="col-md-3">
        <button class="btn btn-accent w-100" type="submit">Issue</button>
      </div>
    </form>
  </div>
  <h2 class="h5">Borrowed / overdue (return)</h2>
  <div class="table-responsive card-lib p-0 mb-4">
    <table class="table table-dark-lib mb-0">
      <thead><tr><th>Book</th><th>Student</th><th>Issued</th><th>Due</th><th>Returned</th><th>Status</th><th></th></tr></thead>
      <tbody>
      <tr th:each="i : ${active}">
        <td th:text="${i.book.title}"></td>
        <td th:text="${i.student.studentId + ' — ' + i.student.fullName}"></td>
        <td th:text="${#temporals.format(i.issuedAt, 'yyyy-MM-dd HH:mm')}"></td>
        <td th:text="${#temporals.format(i.dueAt, 'yyyy-MM-dd HH:mm')}"></td>
        <td>—</td>
        <td th:text="${i.status}"></td>
        <td>
          <div class="d-flex gap-1">
            <button th:attr="data-issue-id=${i.id}, data-book-title=${i.book.title}" 
                    class="btn btn-sm btn-accent admin-return-btn">Return</button>
          </div>
        </td>
      </tr>
      <tr th:each="i : ${overdue}">
        <td th:text="${i.book.title}"></td>
        <td th:text="${i.student.studentId + ' — ' + i.student.fullName}"></td>
        <td th:text="${#temporals.format(i.issuedAt, 'yyyy-MM-dd HH:mm')}"></td>
        <td class="text-warning" th:text="${#temporals.format(i.dueAt, 'yyyy-MM-dd HH:mm')}"></td>
        <td>—</td>
        <td th:text="${i.status}"></td>
        <td>
          <div class="d-flex gap-1">
            <button th:attr="data-issue-id=${i.id}, data-book-title=${i.book.title}" 
                    class="btn btn-sm btn-warning admin-return-fine-btn">Return + fine</button>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
  </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/admin-sidebar :: sidebar-script}"></div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Admin Return book confirmation
    const returnButtons = document.querySelectorAll('.admin-return-btn');
    returnButtons.forEach(button => {
      button.addEventListener('click', function() {
        const issueId = this.getAttribute('data-issue-id');
        const bookTitle = this.getAttribute('data-book-title');
        
        if (typeof confirmAction === 'function') {
          confirmAction(
            `Are you sure you want to return "${bookTitle}"?`,
            function() {
              submitForm(`/admin/issues/${issueId}/return`);
            }
          );
        } else {
          // Fallback if confirmAction is not available
          if (confirm(`Are you sure you want to return "${bookTitle}"?`)) {
            submitForm(`/admin/issues/${issueId}/return`);
          }
        }
      });
    });

    // Admin Return + fine confirmation
    const returnFineButtons = document.querySelectorAll('.admin-return-fine-btn');
    returnFineButtons.forEach(button => {
      button.addEventListener('click', function() {
        const issueId = this.getAttribute('data-issue-id');
        const bookTitle = this.getAttribute('data-book-title');
        
        if (typeof confirmAction === 'function') {
          confirmAction(
            `Are you sure you want to return "${bookTitle}" and apply fine?`,
            function() {
              submitForm(`/admin/issues/${issueId}/return`);
            }
          );
        } else {
          // Fallback if confirmAction is not available
          if (confirm(`Are you sure you want to return "${bookTitle}" and apply fine?`)) {
            submitForm(`/admin/issues/${issueId}/return`);
          }
        }
      });
    });

    // Helper function to submit forms
    function submitForm(action) {
      const form = document.createElement('form');
      form.method = 'post';
      form.action = action;
      
      const csrfToken = document.querySelector('meta[name="_csrf"]');
      if (csrfToken) {
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = '_csrf';
        input.value = csrfToken.getAttribute('content');
        form.appendChild(input);
      }
      
      document.body.appendChild(form);
      form.submit();
    }
  });
</script>
</body>
</html>
