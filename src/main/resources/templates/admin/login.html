<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>EduLibrary - Admin Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/login-new.css(v=ilearn-style-3)}" rel="stylesheet"/>
</head>
<body data-auth-page="true">
  <div class="login-split">
    
    <div class="split-left">
      <div class="logo-area">
        
        <svg class="big-logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          
          <path d="M15 70 L15 35 Q15 30 20 30 L45 40 L45 75 L20 70 Q15 70 15 70 Z" fill="#2E7D32" stroke="#2E7D32" stroke-width="2"/>
          <path d="M85 70 L85 35 Q85 30 80 30 L55 40 L55 75 L80 70 Q85 70 85 70 Z" fill="#2E7D32" stroke="#2E7D32" stroke-width="2"/>
          
          <rect x="25" y="25" width="8" height="35" rx="2" fill="#1976D2" stroke="#1976D2" stroke-width="1"/>
          <rect x="35" y="20" width="8" height="40" rx="2" fill="#388E3C" stroke="#388E3C" stroke-width="1"/>
          <rect x="45" y="28" width="8" height="32" rx="2" fill="#F57C00" stroke="#F57C00" stroke-width="1"/>
          
          <rect x="58" y="28" width="22" height="18" rx="2" fill="#455A64" stroke="#455A64" stroke-width="1"/>
          <rect x="60" y="30" width="18" height="12" rx="1" fill="#ECEFF1"/>
          
          <rect x="66" y="46" width="6" height="5" fill="#455A64"/>
          <rect x="63" y="51" width="12" height="2" rx="1" fill="#455A64"/>
          
          <rect x="62" y="32" width="6" height="2" rx="0.5" fill="#388E3C"/>
          <rect x="62" y="36" width="10" height="2" rx="0.5" fill="#1976D2"/>
          <rect x="62" y="40" width="8" height="2" rx="0.5" fill="#F57C00"/>
          
          <circle cx="50" cy="50" r="48" stroke="url(#gradient)" stroke-width="3" fill="none"/>
          <defs>
            <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#4CAF50"/>
              <stop offset="100%" style="stop-color:#1976D2"/>
            </linearGradient>
          </defs>
        </svg>
        
        <h1 class="brand-name">EduLibrary</h1>
        <p class="brand-tagline">Learning Management System</p>
        
        <div class="admin-badge">
          <i class="bi bi-shield-lock"></i>
          <span>ADMIN PORTAL</span>
        </div>
      </div>
    </div>

    
    <div class="split-right">
      <div class="login-card floating">
        <h2 class="welcome-title">Admin Login</h2>
        <p class="welcome-subtitle">Sign in to your admin account</p>

        <div th:if="${errorMessage}" class="alert alert-danger" role="alert" aria-live="polite" th:text="${errorMessage}"></div>
        <div th:if="${success}" class="alert alert-success" role="status" aria-live="polite" th:text="${success}"></div>

        <form th:action="@{/admin/login}" method="post" class="login-form sl-validate">
          <div class="form-group">
            <label class="form-label">Username</label>
            <div class="input-wrapper">
              <span class="input-icon"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-input" 
                     placeholder="Enter admin username" 
                     required autocomplete="username"/>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrapper">
              <span class="input-icon"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" id="adminPassword" class="form-input" 
                     placeholder="Enter password" 
                     required autocomplete="current-password"/>
              <button type="button" class="toggle-password" id="toggleAdminPasswordBtn">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            LOGIN
          </button>

          <div class="form-footer split-footer">
            <a th:href="@{/forgot-password}" class="forgot-link">Recover My Account</a>
            <a th:href="@{/forgot-password}" class="forgot-link-alt">Can't recover?</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/forms.js}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const passwordInput = document.getElementById('adminPassword');
      const btn = document.getElementById('toggleAdminPasswordBtn');
      if (!passwordInput || !btn) return;
      btn.addEventListener('click', function () {
        const isHidden = passwordInput.type === 'password';
        passwordInput.type = isHidden ? 'text' : 'password';
        btn.querySelector('i').className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
      });
    });
  </script>
</body>
</html>
