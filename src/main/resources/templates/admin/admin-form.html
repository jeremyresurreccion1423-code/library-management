<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('New Admin Account')}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
  <main class="dashboard-main">
    <div class="dashboard-header">
      <h1 class="dashboard-title">New Admin Account</h1>
      <p class="dashboard-subtitle">Create a new administrator account</p>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="profile-card">
      <div class="profile-card-header">
        <div class="profile-avatar" style="width:56px;height:56px;font-size:1.4rem;">
          <i class="bi bi-person-plus"></i>
        </div>
        <div class="profile-info">
          <h4>New Administrator</h4>
          <p>Fill in the details below</p>
        </div>
      </div>

      <form th:action="@{/admin/admins/new}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input class="form-control" name="username" required minlength="5" maxlength="20" placeholder="admin_username"/>
          <small class="form-text text-muted">5-20 characters, letters, numbers, dots, underscores, hyphens</small>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input class="form-control" id="newAdminPassword" type="password" name="password" required minlength="8" placeholder="Enter password"/>
          <small class="form-text text-muted">At least 8 characters with uppercase, lowercase, number, and special character</small>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input class="form-control" id="confirmAdminPassword" type="password" name="confirmPassword" required minlength="8" placeholder="Re-enter password"/>
          <div id="passwordMatchError" class="text-danger small mt-1 d-none">Passwords do not match.</div>
        </div>
        <div class="mb-3 form-check">
          <input class="form-check-input" type="checkbox" id="toggleAdminPasswords"/>
          <label class="form-check-label" for="toggleAdminPasswords">Show passwords</label>
        </div>
        <div class="profile-actions">
          <button type="submit" class="btn btn-accent">
            <i class="bi bi-check-lg me-1"></i>Create Admin
          </button>
          <a class="btn btn-outline-light" th:href="@{/admin/admins}">
            <i class="bi bi-arrow-left me-1"></i>Back
          </a>
        </div>
      </form>
    </div>
  </main>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const pw = document.getElementById('newAdminPassword');
    const cpw = document.getElementById('confirmAdminPassword');
    const err = document.getElementById('passwordMatchError');
    const toggle = document.getElementById('toggleAdminPasswords');

    function checkMatch() {
      if (cpw.value && pw.value !== cpw.value) {
        err.classList.remove('d-none');
        cpw.classList.add('is-invalid');
      } else {
        err.classList.add('d-none');
        cpw.classList.remove('is-invalid');
      }
    }
    pw.addEventListener('input', checkMatch);
    cpw.addEventListener('input', checkMatch);

    if (toggle) {
      toggle.addEventListener('change', function() {
        const t = this.checked ? 'text' : 'password';
        pw.type = t;
        cpw.type = t;
      });
    }

    pw.closest('form').addEventListener('submit', function(e) {
      if (pw.value !== cpw.value) {
        e.preventDefault();
        checkMatch();
        cpw.focus();
      }
    });
  });
</script>

<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/admin-sidebar :: sidebar-script}"></div>
</body>
</html>
