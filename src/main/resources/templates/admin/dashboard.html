<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Admin Dashboard')}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
  <main class="dashboard-main">
    <div class="page-header page-header--ams with-profile">
      <h1>Admin Dashboard</h1>
      <th:block sec:authorize="hasRole('SUPER_ADMIN')">
        <div th:replace="~{fragments/profile-widget :: widget(photoAction=@{/admin/profile/photo}, passwordAction=@{/admin/account/password}, roleLabel='Super Admin', panelId='lib-dash-profile-sa', logoutMode='super-admin')}"></div>
      </th:block>
      <th:block sec:authorize="hasRole('ADMIN') and !hasRole('SUPER_ADMIN')">
        <div th:replace="~{fragments/profile-widget :: widget(photoAction=@{/admin/profile/photo}, passwordAction=@{/admin/account/password}, roleLabel='Admin', panelId='lib-dash-profile-admin', logoutMode='admin')}"></div>
      </th:block>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="ams-stats-grid ams-stats-grid--top">
      <div class="ams-stat-card">
        <div class="value" th:text="${bookCount}">0</div>
        <div class="label">Total Books</div>
      </div>
      <div class="ams-stat-card">
        <div class="value" th:text="${studentCount}">0</div>
        <div class="label">Total Students</div>
      </div>
      <div class="ams-stat-card">
        <div class="value" th:text="${activeLoans}">0</div>
        <div class="label">Active Loans</div>
      </div>
      <div class="ams-stat-card" th:if="${overdueLoans > 0}">
        <div class="value" style="color:#dc2626;" th:text="${overdueLoans}">0</div>
        <div class="label">Overdue Loans</div>
      </div>
    </div>

    <div class="ams-card">
      <h3>Library Loan Analytics</h3>
      <div class="ams-stats-grid">
        <div class="ams-stat-card">
          <div class="value" th:text="${activeLoans}">0</div>
          <div class="label">Active Loans</div>
        </div>
        <div class="ams-stat-card">
          <div class="value" th:text="${studentCount}">0</div>
          <div class="label">Enrolled Students</div>
        </div>
        <div class="ams-stat-card">
          <div class="value" th:text="${bookCount}">0</div>
          <div class="label">Books in Catalog</div>
        </div>
      </div>
    </div>

    <div class="ams-card">
      <h3>Quick Actions</h3>
      <div class="ams-quick-actions">
        <a th:href="@{/admin/books}" class="btn btn-ams-primary">Manage Books</a>
        <a th:href="@{/admin/students}" class="btn btn-ams-primary">Manage Students</a>
        <a th:href="@{/admin/scan-issue}" class="btn btn-ams-primary">Scan &amp; Issue</a>
        <a th:href="@{/admin/analytics}" class="btn btn-ams-secondary">Analytics</a>
      </div>
    </div>
  </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/admin-sidebar :: sidebar-script}"></div>
</body>
</html>
