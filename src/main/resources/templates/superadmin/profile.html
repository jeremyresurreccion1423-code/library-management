<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/superadmin-page-shell :: shell('My Profile — System Control Center', 'My Profile', 'View and update your personal information', ~{::content})}">
<th:block th:fragment="content">

  <section class="sa-profile-hero">
    <div class="sa-profile-hero__avatar">
      <img th:if="${profilePhotoUrl != null}"
           th:src="${profilePhotoUrl}"
           alt="Profile photo"
           width="88"
           height="88"/>
      <span th:unless="${profilePhotoUrl != null}" th:text="${profileInitial ?: 'SA'}">SA</span>
    </div>
    <div style="flex:1;">
      <h2 style="margin:0 0 8px;font-size:1.5rem;font-weight:800;" th:text="${username}">superadmin</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;">
        <span class="sa-badge sa-badge--primary" th:text="${roleLabel}">Super Admin</span>
        <span th:if="${accountActive}" class="sa-badge sa-badge--success">Active</span>
        <span th:unless="${accountActive}" class="sa-badge sa-badge--muted">Inactive</span>
      </div>
      <div style="font-size:0.84rem;opacity:0.88;" th:text="${profileCode}">ID: 1</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="sa-scan-card__icon" style="background:rgba(255,255,255,0.18);color:#fff;"><i data-lucide="calendar"></i></div>
      <div>
        <span style="display:block;font-size:0.72rem;opacity:0.82;">Member Since</span>
        <strong style="font-size:0.92rem;" th:text="${memberSince}">20 Jun 2026</strong>
      </div>
    </div>
  </section>

  <section class="sa-card sa-glass">
    <div class="sa-card__head"><h2>Personal Information</h2></div>
    <ul class="sa-info-list">
      <li class="sa-info-row">
        <div class="sa-info-row__icon"><i data-lucide="user"></i></div>
        <span class="sa-info-row__label">Username</span>
        <span class="sa-info-row__value" th:text="${profileDetails['Username']}">superadmin</span>
      </li>
      <li class="sa-info-row">
        <div class="sa-info-row__icon"><i data-lucide="mail"></i></div>
        <span class="sa-info-row__label">Email</span>
        <span class="sa-info-row__value" th:text="${profileDetails['Email']}">email</span>
      </li>
      <li class="sa-info-row">
        <div class="sa-info-row__icon"><i data-lucide="shield"></i></div>
        <span class="sa-info-row__label">Role</span>
        <span class="sa-info-row__value" th:text="${profileDetails['Role']}">Super Admin</span>
      </li>
      <li class="sa-info-row">
        <div class="sa-info-row__icon"><i data-lucide="check-circle"></i></div>
        <span class="sa-info-row__label">Account Status</span>
        <span class="sa-info-row__value">
          <span th:if="${accountActive}" class="sa-badge sa-badge--success">Active</span>
          <span th:unless="${accountActive}" class="sa-badge sa-badge--muted">Disabled</span>
        </span>
      </li>
      <li class="sa-info-row">
        <div class="sa-info-row__icon"><i data-lucide="calendar"></i></div>
        <span class="sa-info-row__label">Created At</span>
        <span class="sa-info-row__value" th:text="${profileDetails['Created At']}">—</span>
      </li>
    </ul>
  </section>

  <section class="sa-card sa-glass">
    <div class="sa-card__head"><h2>Edit Account</h2></div>

    <form th:action="@{/superadmin/profile/photo}" method="post" enctype="multipart/form-data" style="margin-bottom:24px;">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="sa-form-field">
        <label for="photo">Profile Photo</label>
        <div class="sa-form-row">
          <input type="file" id="photo" name="photo" accept="image/*" class="sa-input" required/>
          <button type="submit" class="sa-btn sa-btn--primary">
            <i data-lucide="upload"></i> Upload
          </button>
        </div>
        <small class="sa-form-hint">JPG, PNG, GIF, or WebP. Max 5MB.</small>
      </div>
    </form>

    <form th:action="@{/superadmin/profile}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="sa-form-field">
        <label for="username">Username</label>
        <input type="text" class="sa-input" id="username" name="username"
               th:value="${username}" required
               pattern="[A-Za-z0-9_-]+"
               title="Only letters, numbers, underscore, and hyphen allowed."/>
      </div>
      <div class="sa-form-actions">
        <button type="submit" class="sa-btn sa-btn--primary">
          <i data-lucide="save"></i> Save Username
        </button>
        <a class="sa-btn sa-btn--ghost" th:href="${dashboardPath != null ? dashboardPath : '/super-admin'}">
          <i data-lucide="arrow-left"></i> Back
        </a>
      </div>
    </form>
  </section>
</th:block>
</body>
</html>
