<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/superadmin-page-shell :: shell('Issue / Return — Library', 'Issue / Return', 'Manage book loans and returns', ~{::content})}">
<th:block th:fragment="content">

  <section class="sa-card sa-glass">
    <div class="sa-card__head"><h2>Issue Book</h2></div>
    <form class="sa-filter-bar" th:action="@{/superadmin/library/issues/issue}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="sa-form-field sa-form-field--grow">
        <label for="bookId">Book</label>
        <select class="sa-select" id="bookId" name="bookId" required>
          <option th:each="b : ${books}" th:value="${b.id}"
                  th:text="${b.title + ' (' + b.availableCopies + ' avail)'}"
                  th:selected="${selectedBookId != null and selectedBookId == b.id}"></option>
        </select>
      </div>
      <div class="sa-form-field">
        <label for="studentId">Student ID o username</label>
        <input class="sa-input" id="studentId" name="studentId" required placeholder="STU2026..."/>
      </div>
      <button class="sa-btn sa-btn--primary" type="submit">
        <i class="bi bi-send"></i> Issue
      </button>
    </form>
  </section>

  <section class="sa-card sa-glass">
    <div class="sa-card__head"><h2>Borrowed / Overdue (Return)</h2></div>
    <div class="sa-table-wrap">
      <table class="sa-table">
        <thead>
        <tr>
          <th>Book</th>
          <th>Student</th>
          <th>Issued</th>
          <th>Due</th>
          <th>Returned</th>
          <th>Status</th>
          <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="i : ${active}">
          <td th:text="${i.book.title}"></td>
          <td th:text="${i.student.studentId + ' — ' + i.student.fullName}"></td>
          <td th:text="${#temporals.format(i.issuedAt, 'yyyy-MM-dd HH:mm')}"></td>
          <td th:text="${#temporals.format(i.dueAt, 'yyyy-MM-dd HH:mm')}"></td>
          <td>—</td>
          <td><span class="sa-badge sa-badge--primary" th:text="${i.status}"></span></td>
          <td class="sa-table__actions">
            <button th:attr="data-issue-id=${i.id}, data-book-title=${i.book.title}"
                    class="sa-btn sa-btn--primary sa-btn--sm admin-return-btn">
              <i class="bi bi-arrow-return-left"></i> Return
            </button>
          </td>
        </tr>
        <tr th:each="i : ${overdue}">
          <td th:text="${i.book.title}"></td>
          <td th:text="${i.student.studentId + ' — ' + i.student.fullName}"></td>
          <td th:text="${#temporals.format(i.issuedAt, 'yyyy-MM-dd HH:mm')}"></td>
          <td style="color:#B45309;" th:text="${#temporals.format(i.dueAt, 'yyyy-MM-dd HH:mm')}"></td>
          <td>—</td>
          <td><span class="sa-badge sa-badge--danger" th:text="${i.status}"></span></td>
          <td class="sa-table__actions">
            <button th:attr="data-issue-id=${i.id}, data-book-title=${i.book.title}"
                    class="sa-btn sa-btn--warning sa-btn--sm admin-return-fine-btn">
              <i class="bi bi-exclamation-triangle"></i> Return + fine
            </button>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
    <p th:if="${#lists.isEmpty(active) and #lists.isEmpty(overdue)}" class="sa-empty">No active or overdue loans.</p>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      function submitForm(action) {
        const form = document.createElement('form');
        form.method = 'post';
        form.action = action;
        const csrfToken = document.querySelector('meta[name="_csrf"]');
        if (csrfToken) {
          const input = document.createElement('input');
          input.type = 'hidden';
          input.name = '_csrf';
          input.value = csrfToken.getAttribute('content');
          form.appendChild(input);
        }
        document.body.appendChild(form);
        form.submit();
      }

      document.querySelectorAll('.admin-return-btn').forEach(button => {
        button.addEventListener('click', function() {
          const issueId = this.getAttribute('data-issue-id');
          const bookTitle = this.getAttribute('data-book-title');
          const msg = 'Are you sure you want to return "' + bookTitle + '"?';
          if (typeof confirmAction === 'function') {
            confirmAction(msg, function() { submitForm('/superadmin/library/issues/' + issueId + '/return'); });
          } else if (confirm(msg)) {
            submitForm('/superadmin/library/issues/' + issueId + '/return');
          }
        });
      });

      document.querySelectorAll('.admin-return-fine-btn').forEach(button => {
        button.addEventListener('click', function() {
          const issueId = this.getAttribute('data-issue-id');
          const bookTitle = this.getAttribute('data-book-title');
          const msg = 'Are you sure you want to return "' + bookTitle + '" and apply fine?';
          if (typeof confirmAction === 'function') {
            confirmAction(msg, function() { submitForm('/superadmin/library/issues/' + issueId + '/return'); });
          } else if (confirm(msg)) {
            submitForm('/superadmin/library/issues/' + issueId + '/return');
          }
        });
      });
    });
  </script>
</th:block>
</body>
</html>
