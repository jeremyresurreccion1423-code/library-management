<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/superadmin-page-shell :: shell('Scan & Issue — Library', 'Scan & Issue', 'Scan a book to see details, then scan a student ID to issue', ~{::content})}">
<th:block th:fragment="content">

  <div id="flash" class="sa-alert sa-hidden"></div>

  <div id="bookCard" class="sa-scan-card sa-hidden">
    <div class="sa-scan-card__icon"><i data-lucide="book-open"></i></div>
    <div style="flex:1;">
      <h3 style="margin:0 0 4px;font-size:1rem;" id="bookCardTitle">Book Title</h3>
      <p class="sa-muted-inline" style="margin:0 0 6px;" id="bookCardAuthor">Author</p>
      <span class="sa-badge sa-badge--success" id="bookCardStatus">Available</span>
    </div>
    <a th:href="@{/books/0}" id="bookCardLink" class="sa-btn sa-btn--ghost sa-btn--sm">
      <i data-lucide="eye"></i> View
    </a>
  </div>

  <div id="studentCard" class="sa-scan-card sa-hidden">
    <div class="sa-scan-card__icon sa-scan-card__icon--success"><i data-lucide="user"></i></div>
    <div style="flex:1;">
      <h3 style="margin:0 0 4px;font-size:1rem;">Student</h3>
      <p class="sa-muted-inline" style="margin:0;" id="studentCardId">ID</p>
    </div>
  </div>

  <div class="sa-scan-grid">
    <section class="sa-card sa-glass">
      <div class="sa-card__head">
        <h2>Camera</h2>
        <button type="button" class="sa-btn sa-btn--ghost sa-btn--sm" id="btnReset">
          <i data-lucide="rotate-ccw"></i> Reset
        </button>
      </div>
      <div id="reader" class="sa-scan-reader"></div>
      <p class="sa-muted-inline" style="margin-top:12px;" id="status"></p>
    </section>

    <section class="sa-card sa-glass">
      <div class="sa-card__head">
        <h2><i data-lucide="edit-3"></i> Manual Entry</h2>
      </div>
      <p class="sa-lead">Enter book barcode and student ID manually, then click <strong>Issue Now</strong>.</p>

      <input type="hidden" id="bookId"/>
      <input type="hidden" id="studentIdHidden"/>

      <div class="sa-form-field">
        <label for="manualBarcode">Book Barcode / QR</label>
        <input class="sa-input" id="manualBarcode" placeholder="Barcode or BOOK:ID"/>
      </div>
      <button type="button" class="sa-btn sa-btn--ghost" id="btnSearchBarcode" style="width:100%;margin-bottom:16px;">
        <i data-lucide="search"></i> Search Book
      </button>

      <div class="sa-form-field">
        <label for="manualStudent">Student ID / Username</label>
        <input class="sa-input" id="manualStudent" placeholder="101-000 or username"/>
      </div>

      <button class="sa-btn sa-btn--primary" id="btnIssueManual" type="button" disabled style="width:100%;">
        <i data-lucide="check-circle"></i> Issue Now
      </button>
    </section>
  </div>

  <div class="modal fade" id="issueSuccessModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
      <div class="modal-content" style="border:none;border-radius:16px;">
        <div class="modal-body text-center" style="padding:28px;">
          <div style="color:#059669;margin-bottom:12px;"><i data-lucide="check-circle" style="width:48px;height:48px;"></i></div>
          <h5 style="margin:0 0 8px;font-weight:700;">Issued Successfully!</h5>
          <p class="sa-muted-inline" style="margin:0;">The book has been issued to the student.</p>
        </div>
        <div class="modal-footer border-0 justify-content-center" style="padding-bottom:24px;">
          <button type="button" class="sa-btn sa-btn--primary" data-bs-dismiss="modal" onclick="clearInputsAfterIssue()">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script>
    const csrfMeta = document.querySelector('meta[name="_csrf"]');
    const csrfToken = csrfMeta ? csrfMeta.getAttribute('content') : null;
    const statusEl = document.getElementById('status');
    const flashEl = document.getElementById('flash');
    const bookIdEl = document.getElementById('bookId');
    const studentIdEl = document.getElementById('studentIdHidden');
    let lastScannedCode = '';
    let lastScanTime = 0;
    const SCAN_COOLDOWN_MS = 2000;

    function showFlash(kind, msg) {
      flashEl.classList.remove('sa-hidden', 'sa-alert--success', 'sa-alert--danger', 'sa-alert--warning');
      flashEl.classList.add(kind === 'success' ? 'sa-alert--success' : (kind === 'error' ? 'sa-alert--danger' : 'sa-alert--warning'));
      flashEl.textContent = msg;
    }

    function clearFlash() {
      flashEl.classList.add('sa-hidden');
      flashEl.textContent = '';
    }

    function parseBookIdFromPayload(payload) {
      if (!payload) return null;
      const t = String(payload).trim();
      if (!t.startsWith('BOOK:')) return null;
      const id = t.substring('BOOK:'.length).trim();
      if (!/^\d+$/.test(id)) return null;
      return id;
    }

    function normalizeStudentValue(raw) {
      if (!raw) return '';
      let t = String(raw).trim();
      if (t.toUpperCase().startsWith('STUDENT:')) {
        t = t.substring('STUDENT:'.length).trim();
      }
      return t;
    }

    function refreshIssueButton() {
      const ok = !!bookIdEl.value && !!normalizeStudentValue(studentIdEl.value);
      const manualIssueBtn = document.getElementById('btnIssueManual');
      if (manualIssueBtn) manualIssueBtn.disabled = !ok;
    }

    async function issueNow() {
      clearFlash();
      const bookId = bookIdEl.value;
      const studentId = normalizeStudentValue(studentIdEl.value);
      if (!bookId || !studentId) return;

      const manualIssueBtn = document.getElementById('btnIssueManual');
      if (manualIssueBtn) manualIssueBtn.disabled = true;
      statusEl.textContent = 'Issuing...';
      try {
        const body = new URLSearchParams();
        body.set('bookId', bookId);
        body.set('studentId', studentId);
        if (csrfToken) body.set('_csrf', csrfToken);

        const r = await fetch('/superadmin/library/issues/issue', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: body.toString()
        });

        if (r.redirected) {
          window.location.href = r.url;
          return;
        }

        if (!r.ok) {
          showFlash('error', 'Issue failed. Please check the inputs.');
        } else {
          const successModal = new bootstrap.Modal(document.getElementById('issueSuccessModal'));
          successModal.show();
        }
      } catch (e) {
        showFlash('error', 'Issue error: ' + e);
      } finally {
        statusEl.textContent = '';
        refreshIssueButton();
      }
    }

    function clearInputsAfterIssue() {
      bookIdEl.value = '';
      studentIdEl.value = '';
      document.getElementById('manualBarcode').value = '';
      document.getElementById('manualStudent').value = '';
      hideBookCard();
      hideStudentCard();
      statusEl.textContent = '';
      clearFlash();
      refreshIssueButton();
    }

    function showBookCard(book) {
      document.getElementById('bookCardTitle').textContent = book.title;
      document.getElementById('bookCardAuthor').textContent = book.author || 'Unknown Author';
      const statusBadge = document.getElementById('bookCardStatus');
      statusBadge.className = 'sa-badge ' + (book.isAvailable ? 'sa-badge--success' : 'sa-badge--danger');
      statusBadge.textContent = book.isAvailable
        ? book.availableCopies + ' copy(s) available'
        : 'Not available';
      document.getElementById('bookCardLink').href = '/books/' + book.bookId;
      document.getElementById('bookCard').classList.remove('sa-hidden');
    }

    function hideBookCard() {
      document.getElementById('bookCard').classList.add('sa-hidden');
    }

    function showStudentCard(studentId) {
      document.getElementById('studentCardId').textContent = studentId;
      document.getElementById('studentCard').classList.remove('sa-hidden');
    }

    function hideStudentCard() {
      document.getElementById('studentCard').classList.add('sa-hidden');
    }

    async function lookupBook(code) {
      if (!code) return null;
      try {
        const r = await fetch('/api/lookup/any?code=' + encodeURIComponent(code.trim()));
        if (!r.ok) { showFlash('error', 'Book not found: ' + code); return null; }
        return await r.json();
      } catch (e) {
        showFlash('error', 'Book lookup error.');
        return null;
      }
    }

    async function lookupBarcodeAndSetBookId(code) {
      const book = await lookupBook(code);
      if (book) {
        bookIdEl.value = book.bookId;
        showBookCard(book);
        showFlash('info', 'Book: ' + book.title);
        return true;
      }
      return false;
    }

    async function issueManualNow() {
      const barcodeVal = document.getElementById('manualBarcode').value.trim();
      if (barcodeVal && !bookIdEl.value) {
        await lookupBarcodeAndSetBookId(barcodeVal);
      }
      const studentVal = document.getElementById('manualStudent').value.trim();
      if (studentVal && !studentIdEl.value) {
        const s = normalizeStudentValue(studentVal);
        if (s) {
          studentIdEl.value = s;
          showFlash('info', 'Student set: ' + s);
        }
      }
      refreshIssueButton();
      const manualIssueBtn = document.getElementById('btnIssueManual');
      if (manualIssueBtn && !manualIssueBtn.disabled) {
        issueNow();
      } else {
        showFlash('error', 'Please provide a valid book barcode and student ID.');
      }
    }

    async function onScan(decodedText) {
      const now = Date.now();
      if (decodedText === lastScannedCode && (now - lastScanTime) < SCAN_COOLDOWN_MS) return;
      lastScannedCode = decodedText;
      lastScanTime = now;
      statusEl.textContent = 'Scanned: ' + decodedText;

      const qrBookId = parseBookIdFromPayload(decodedText);
      if (qrBookId) {
        const book = await lookupBook(decodedText);
        if (book) {
          bookIdEl.value = book.bookId;
          showBookCard(book);
          showFlash('info', 'Book: ' + book.title);
          refreshIssueButton();
        }
        return;
      }

      const book = await lookupBook(decodedText);
      if (book) {
        bookIdEl.value = book.bookId;
        showBookCard(book);
        showFlash('info', 'Book: ' + book.title);
        refreshIssueButton();
        return;
      }

      const student = normalizeStudentValue(decodedText);
      if (student) {
        studentIdEl.value = student;
        showStudentCard(student);
        showFlash('info', 'Student: ' + student);
        refreshIssueButton();
        const manualIssueBtn = document.getElementById('btnIssueManual');
        if (manualIssueBtn && !manualIssueBtn.disabled) {
          issueNow();
        }
      }
    }

    let html5QrCode = null;

    async function startScanner() {
      statusEl.textContent = 'Initializing camera...';
      if (typeof Html5Qrcode === 'undefined') {
        statusEl.textContent = 'Scanner library failed to load. Refresh the page.';
        showFlash('error', 'Scanner library blocked or offline. Refresh and try again.');
        return;
      }
      if (!window.isSecureContext) {
        statusEl.textContent = 'Camera needs HTTPS.';
        showFlash('error', 'Open this page using https:// so the camera can start.');
        return;
      }
      if (html5QrCode) {
        try { await html5QrCode.stop(); } catch(e) {}
        try { html5QrCode.clear(); } catch(e) {}
      }
      const reader = document.getElementById('reader');
      reader.innerHTML = '';
      html5QrCode = new Html5Qrcode('reader');
      lastScannedCode = '';
      lastScanTime = 0;

      let cameraConfig = { facingMode: 'environment' };
      try {
        const cameras = await Html5Qrcode.getCameras();
        if (cameras && cameras.length) {
          const backCamera = cameras.find(c => {
            const label = (c.label || '').toLowerCase();
            return label.includes('back') || label.includes('environment') || label.includes('rear');
          });
          cameraConfig = backCamera ? backCamera.id : cameras[0].id;
        }
      } catch (e) {}

      try {
        await html5QrCode.start(
          cameraConfig,
          { fps: 10, qrbox: { width: 220, height: 220 } },
          (decodedText) => { onScan(decodedText); },
          () => {}
        );
        statusEl.textContent = 'Camera ready. Point at QR/barcode...';
      } catch (e) {
        try {
          await html5QrCode.start(
            { facingMode: 'environment' },
            { fps: 10, qrbox: { width: 220, height: 220 } },
            (decodedText) => { onScan(decodedText); },
            () => {}
          );
          statusEl.textContent = 'Camera ready. Point at QR/barcode...';
        } catch (e2) {
          const msg = String(e2 && e2.message ? e2.message : e2);
          statusEl.textContent = msg.includes('Permission') ? 'Camera permission denied.' : 'Camera error: ' + msg;
          showFlash('error', statusEl.textContent);
        }
      }
    }

    document.getElementById('btnReset').addEventListener('click', function () {
      bookIdEl.value = '';
      studentIdEl.value = '';
      document.getElementById('manualBarcode').value = '';
      document.getElementById('manualStudent').value = '';
      hideBookCard();
      hideStudentCard();
      clearFlash();
      refreshIssueButton();
      startScanner();
    });

    document.getElementById('btnIssueManual').addEventListener('click', issueManualNow);
    document.getElementById('btnSearchBarcode').addEventListener('click', async () => {
      const barcodeVal = document.getElementById('manualBarcode').value.trim();
      if (!barcodeVal) { showFlash('error', 'Please enter a barcode.'); return; }
      await lookupBarcodeAndSetBookId(barcodeVal);
      refreshIssueButton();
    });

    document.getElementById('manualBarcode').addEventListener('keypress', async (e) => {
      if (e.key === 'Enter') {
        const barcodeVal = document.getElementById('manualBarcode').value.trim();
        if (barcodeVal) { await lookupBarcodeAndSetBookId(barcodeVal); refreshIssueButton(); }
      }
    });

    document.getElementById('manualStudent').addEventListener('input', (e) => {
      const studentVal = e.target.value.trim();
      studentIdEl.value = studentVal ? (normalizeStudentValue(studentVal) || '') : '';
      refreshIssueButton();
    });

    document.getElementById('manualStudent').addEventListener('keypress', async (e) => {
      if (e.key === 'Enter') {
        const studentVal = e.target.value.trim();
        if (studentVal) {
          const s = normalizeStudentValue(studentVal);
          if (s) {
            studentIdEl.value = s;
            refreshIssueButton();
            const manualIssueBtn = document.getElementById('btnIssueManual');
            if (manualIssueBtn && !manualIssueBtn.disabled) issueNow();
          }
        }
      }
    });

    refreshIssueButton();
    startScanner();
  </script>
</th:block>
</body>
</html>
