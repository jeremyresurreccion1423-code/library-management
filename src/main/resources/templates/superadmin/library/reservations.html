<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/superadmin-page-shell :: shell('Reservations — Library', 'Reservations', 'All student reservation requests', ~{::content})}">
<th:block th:fragment="content">

  <section class="sa-card sa-glass">
    <div class="sa-table-wrap" th:if="${!#lists.isEmpty(reservations)}">
      <table class="sa-table">
        <thead>
        <tr>
          <th>ID</th>
          <th>Book</th>
          <th>Student</th>
          <th>Queue #</th>
          <th>Status</th>
          <th>Created</th>
          <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${reservations}">
          <td th:text="${r.id}"></td>
          <td>
            <strong th:text="${r.book.title}"></strong>
            <div class="sa-muted-inline" th:if="${r.book.isbn != null}" th:text="${'ISBN: ' + r.book.isbn}"></div>
          </td>
          <td>
            <span th:text="${r.student.fullName}"></span>
            <div class="sa-muted-inline" th:text="${r.student.studentId}"></div>
          </td>
          <td th:text="${r.queueOrder}"></td>
          <td>
            <span class="sa-badge"
                  th:classappend="${r.status.name() == 'WAITING'} ? ' sa-badge--warning' : (${r.status.name() == 'FULFILLED'} ? ' sa-badge--success' : ' sa-badge--muted')"
                  th:text="${r.status}"></span>
          </td>
          <td th:text="${#temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
          <td class="sa-table__actions">
            <form th:if="${r.status.name() == 'WAITING'}"
                  th:action="@{/superadmin/library/issues/reservations/{id}/issue(id=${r.id})}" method="post">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="sa-btn sa-btn--primary sa-btn--sm">
                <i data-lucide="send"></i> Issue Now
              </button>
            </form>
            <span th:if="${r.status.name() != 'WAITING'}" class="sa-muted-inline">—</span>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
    <p th:if="${#lists.isEmpty(reservations)}" class="sa-empty">No reservations found.</p>
  </section>
</th:block>
</body>
</html>
