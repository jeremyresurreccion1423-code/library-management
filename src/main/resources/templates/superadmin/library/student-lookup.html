<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/superadmin-page-shell :: shell('Student Lookup — Library', 'Search Student', 'Search and view student information', ~{::content})}">
<th:block th:fragment="content">

  <section class="sa-card sa-glass">
    <form class="sa-form-row" method="get" th:action="@{/superadmin/library/students}">
      <div class="sa-form-field sa-form-field--grow">
        <label for="query">Search</label>
        <input class="sa-input" id="query" name="query" placeholder="Search by ID, name, email, or phone..." th:value="${query}"/>
      </div>
      <button class="sa-btn sa-btn--primary" type="submit">
        <i class="bi bi-search"></i> Search
      </button>
      <a th:if="${isSearch}" th:href="@{/superadmin/library/students}" class="sa-btn sa-btn--ghost">
        <i class="bi bi-x-lg"></i> Clear
      </a>
    </form>
  </section>

  <div class="sa-alert sa-alert--warning" th:if="${notFound}">No students matched your search.</div>
  <div class="sa-alert sa-alert--warning" th:if="${noStudents}">No students in the library system yet.</div>

  <section class="sa-card sa-glass" th:if="${students != null && !students.isEmpty()}">
    <div class="sa-table-wrap">
      <table class="sa-table">
        <thead>
        <tr>
          <th>Student ID</th>
          <th>Full Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Course</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="student : ${students}" class="student-row"
            th:attr="data-profile-id=${student.id}">
          <td th:text="${student.studentId}"></td>
          <td th:text="${student.fullName}"></td>
          <td th:text="${student.user.email}"></td>
          <td th:text="${student.phone}"></td>
          <td th:text="${student.course}"></td>
          <td>
            <span class="sa-badge" th:classappend="${student.archived} ? ' sa-badge--muted' : ' sa-badge--success'"
                  th:text="${student.archived} ? 'ARCHIVED' : 'ACTIVE'"></span>
          </td>
          <td class="sa-table__actions">
            <button type="button" class="sa-btn sa-btn--ghost sa-btn--sm view-student-btn">
              <i class="bi bi-eye"></i> View
            </button>
            <form th:if="${!student.archived}"
                  th:action="@{/superadmin/library/students/{id}/archive(id=${student.id})}" method="post" class="confirm-action"
                  style="display:inline;"
                  data-confirm-message="Archive this student? Records are kept and login will be disabled.">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="hidden" name="query" th:value="${query}"/>
              <button type="submit" class="sa-btn sa-btn--warning sa-btn--sm">Archive</button>
            </form>
            <form th:if="${student.archived}"
                  th:action="@{/superadmin/library/students/{id}/restore(id=${student.id})}" method="post" class="confirm-action"
                  style="display:inline;"
                  data-confirm-message="Restore this student to ACTIVE?">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="hidden" name="query" th:value="${query}"/>
              <button type="submit" class="sa-btn sa-btn--primary sa-btn--sm">Restore</button>
            </form>
            <form th:if="${!student.archived}"
                  th:action="@{/superadmin/library/students/{id}/delete(id=${student.id})}" method="post" class="confirm-delete"
                  style="display:inline;"
                  data-confirm-message="Delete this student from the library? Only allowed if they have no borrowing history.">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="hidden" name="query" th:value="${query}"/>
              <button type="submit" class="sa-btn sa-btn--outline-danger sa-btn--sm">Delete</button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>

  <div class="modal fade" id="studentModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content" style="border:none;border-radius:16px;">
        <div class="modal-header border-0">
          <h5 class="modal-title" style="font-weight:700;color:var(--sa-primary-deep);">Student Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="sa-scan-card">
            <div class="sa-scan-card__icon"><i class="bi bi-person"></i></div>
            <div>
              <h5 style="margin:0;font-weight:700;" id="modalStudentName">-</h5>
              <p class="sa-muted-inline" style="margin:0;" id="modalStudentId">-</p>
            </div>
          </div>
          <div class="sa-grid-2" style="margin-bottom:20px;">
            <div><p class="sa-muted-inline" style="margin:0 0 4px;">Course</p><p style="margin:0;font-weight:600;" id="modalStudentCourse">-</p></div>
            <div><p class="sa-muted-inline" style="margin:0 0 4px;">Email</p><p style="margin:0;font-weight:600;" id="modalStudentEmail">-</p></div>
            <div><p class="sa-muted-inline" style="margin:0 0 4px;">Phone</p><p style="margin:0;font-weight:600;" id="modalStudentPhone">-</p></div>
          </div>
          <h6 style="font-weight:700;color:var(--sa-primary-deep);margin-bottom:12px;">Reading History</h6>
          <div class="sa-table-wrap">
            <table class="sa-table">
              <thead><tr><th>Book</th><th>Issued</th><th>Due</th><th>Returned</th><th>Fine</th><th>Status</th><th>Action</th></tr></thead>
              <tbody id="modalHistoryBody">
                <tr><td colspan="7" class="sa-empty">Loading history...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
        <div class="modal-footer border-0">
          <button type="button" class="sa-btn sa-btn--ghost" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.view-student-btn').forEach(button => {
        button.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          loadStudentDetails(this.closest('tr'));
        });
      });
    });

    let studentModalInstance = null;

    function loadStudentDetails(row) {
      const studentId = row.cells[0].textContent;
      document.getElementById('modalStudentName').textContent = row.cells[1].textContent;
      document.getElementById('modalStudentId').textContent = 'ID: ' + studentId;
      document.getElementById('modalStudentEmail').textContent = row.cells[2].textContent;
      document.getElementById('modalStudentPhone').textContent = row.cells[3].textContent || '—';
      document.getElementById('modalStudentCourse').textContent = row.cells[4].textContent || '—';
      document.getElementById('modalHistoryBody').innerHTML = '<tr><td colspan="7" class="sa-empty">Loading history...</td></tr>';

      if (!studentModalInstance) {
        studentModalInstance = new bootstrap.Modal(document.getElementById('studentModal'));
      }
      studentModalInstance.show();
      loadStudentHistory(studentId);
    }

    function loadStudentHistory(studentId) {
      const tbody = document.getElementById('modalHistoryBody');
      fetch('/superadmin/library/students/' + encodeURIComponent(studentId) + '/history')
        .then(response => {
          if (!response.ok) throw new Error('Could not load student history');
          return response.json();
        })
        .then(data => {
          const rows = Array.isArray(data.history) ? data.history : [];
          if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="7" class="sa-empty">No borrowed history for this student</td></tr>';
            return;
          }
          tbody.innerHTML = '';
          rows.forEach(item => {
            const tr = document.createElement('tr');
            const canRemind = item.status === 'BORROWED' || item.status === 'OVERDUE';
            tr.innerHTML = `
              <td>${escapeHtml(item.bookTitle || '-')}</td>
              <td>${escapeHtml(item.issuedAt || '-')}</td>
              <td>${escapeHtml(item.dueAt || '-')}</td>
              <td>${escapeHtml(item.returnedAt || '-')}</td>
              <td>${escapeHtml(item.fineAmount || '0.00')}</td>
              <td>${escapeHtml(item.status || '-')}</td>
              <td>${canRemind ? '<button type="button" class="sa-btn sa-btn--warning sa-btn--sm remind-btn" data-issue-id="' + item.issueId + '">Remind return</button>' : '<span class="sa-muted-inline">—</span>'}</td>
            `;
            tbody.appendChild(tr);
          });
          wireRemindButtons();
        })
        .catch(error => {
          tbody.innerHTML = '<tr><td colspan="7" class="sa-empty" style="color:#B91C1C;">' + escapeHtml(error.message) + '</td></tr>';
        });
    }

    function wireRemindButtons() {
      document.querySelectorAll('.remind-btn').forEach(button => {
        button.addEventListener('click', function() {
          const issueId = this.getAttribute('data-issue-id');
          const submitRemind = function() {
            const form = document.createElement('form');
            form.method = 'post';
            form.action = '/superadmin/library/students/issues/' + issueId + '/remind';
            const csrfMeta = document.querySelector('meta[name="_csrf"]');
            if (csrfMeta) {
              const csrf = document.createElement('input');
              csrf.type = 'hidden';
              csrf.name = '_csrf';
              csrf.value = csrfMeta.getAttribute('content');
              form.appendChild(csrf);
            }
            document.body.appendChild(form);
            form.submit();
          };
          if (typeof confirmAction === 'function') {
            confirmAction('Send reminder email to return this borrowed book?', submitRemind);
          } else if (confirm('Send reminder email to return this borrowed book?')) {
            submitRemind();
          }
        });
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
  </script>
</th:block>
</body>
</html>
