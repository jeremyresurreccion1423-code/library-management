<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/superadmin-page-shell :: shell('New Admin Account — Library', 'New Admin Account', 'Create a new library administrator account', ~{::content})}">
<th:block th:fragment="content">

  <section class="sa-card sa-glass" style="max-width:640px;">
    <div class="sa-card__head">
      <h2>New Administrator</h2>
    </div>
    <p class="sa-lead">Fill in the details below to create a library admin account.</p>

    <form th:action="@{/superadmin/library/admins/new}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="sa-form-field">
        <label for="username">Username</label>
        <input class="sa-input" id="username" name="username" required minlength="5" maxlength="20" placeholder="admin_username"/>
        <small class="sa-form-hint">5–20 characters: letters, numbers, dots, underscores, hyphens</small>
      </div>
      <div class="sa-form-field">
        <label for="newAdminPassword">Password</label>
        <input class="sa-input" id="newAdminPassword" type="password" name="password" required minlength="8" placeholder="Enter password"/>
        <small class="sa-form-hint">At least 8 characters with uppercase, lowercase, number, and special character</small>
      </div>
      <div class="sa-form-field">
        <label for="confirmAdminPassword">Confirm Password</label>
        <input class="sa-input" id="confirmAdminPassword" type="password" name="confirmPassword" required minlength="8" placeholder="Re-enter password"/>
        <div id="passwordMatchError" class="sa-form-hint sa-hidden" style="color:#B91C1C;">Passwords do not match.</div>
      </div>
      <div class="sa-form-check">
        <input type="checkbox" id="toggleAdminPasswords"/>
        <label for="toggleAdminPasswords">Show passwords</label>
      </div>
      <div class="sa-form-actions">
        <button type="submit" class="sa-btn sa-btn--primary">
          <i data-lucide="check"></i> Create Admin
        </button>
        <a class="sa-btn sa-btn--ghost" th:href="@{/superadmin/library/admins}">
          <i data-lucide="arrow-left"></i> Back
        </a>
      </div>
    </form>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const pw = document.getElementById('newAdminPassword');
      const cpw = document.getElementById('confirmAdminPassword');
      const err = document.getElementById('passwordMatchError');
      const toggle = document.getElementById('toggleAdminPasswords');

      function checkMatch() {
        if (cpw.value && pw.value !== cpw.value) {
          err.classList.remove('sa-hidden');
        } else {
          err.classList.add('sa-hidden');
        }
      }
      pw.addEventListener('input', checkMatch);
      cpw.addEventListener('input', checkMatch);

      if (toggle) {
        toggle.addEventListener('change', function() {
          const t = this.checked ? 'text' : 'password';
          pw.type = t;
          cpw.type = t;
        });
      }

      pw.closest('form').addEventListener('submit', function(e) {
        if (pw.value !== cpw.value) {
          e.preventDefault();
          checkMatch();
          cpw.focus();
        }
      });
    });
  </script>
</th:block>
</body>
</html>
