<html xmlns:th="http://www.thymeleaf.org">
<body th:replace="~{fragments/superadmin-page-shell :: shell('Categories — Library', 'Categories', 'Manage book categories', ~{::content})}">
<th:block th:fragment="content">

  <section class="sa-card sa-glass">
    <div class="sa-card__head"><h2>Add Category</h2></div>
    <form class="sa-form-row" th:action="@{/superadmin/library/categories}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="sa-form-field">
        <label for="categoryName">Category name</label>
        <input class="sa-input" id="categoryName" name="name" placeholder="New category" required/>
      </div>
      <button class="sa-btn sa-btn--primary" type="submit">
        <i data-lucide="plus"></i> Add
      </button>
    </form>
  </section>

  <section class="sa-card sa-glass">
    <div class="sa-card__head"><h2>All Categories</h2></div>
    <div class="sa-table-wrap">
      <table class="sa-table">
        <thead><tr><th>Name</th><th></th></tr></thead>
        <tbody>
        <tr th:each="c : ${categories}">
          <td>
            <form th:action="@{/superadmin/library/categories/{id}/edit(id=${c.id})}" method="post" class="sa-form-row">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <div class="sa-form-field">
                <input class="sa-input" name="name" th:value="${c.name}"/>
              </div>
              <button class="sa-btn sa-btn--ghost sa-btn--sm" type="submit">Save</button>
            </form>
          </td>
          <td class="sa-table__actions">
            <button class="sa-btn sa-btn--outline-danger sa-btn--sm delete-category-btn" type="button"
                    th:attr="data-category-id=${c.id},data-category-name=${c.name}">
              <i data-lucide="trash-2"></i> Delete
            </button>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
    <p th:if="${#lists.isEmpty(categories)}" class="sa-empty">No categories yet.</p>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('.delete-category-btn').forEach(function(button) {
        button.addEventListener('click', function() {
          const categoryId = button.getAttribute('data-category-id');
          const categoryName = button.getAttribute('data-category-name');
          const message = 'Are you sure you want to delete "' + categoryName + '"?';
          const submitDelete = function() {
            const form = document.createElement('form');
            form.method = 'post';
            form.action = '/superadmin/library/categories/' + categoryId + '/delete';
            const csrfToken = document.querySelector('meta[name="_csrf"]');
            if (csrfToken) {
              const input = document.createElement('input');
              input.type = 'hidden';
              input.name = '_csrf';
              input.value = csrfToken.getAttribute('content');
              form.appendChild(input);
            }
            document.body.appendChild(form);
            form.submit();
          };
          if (typeof confirmAction === 'function') {
            confirmAction(message, submitDelete);
          } else if (confirm(message)) {
            submitDelete();
          }
        });
      });
    });
  </script>
</th:block>
</body>
</html>
