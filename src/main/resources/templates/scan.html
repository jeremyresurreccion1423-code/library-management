<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Scan Book')}"></head>
<body class="dashboard-body">
<style>
  #reader video {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    border-radius: 12px;
  }
</style>
<div class="dashboard-wrapper">
  <div th:replace="~{fragments/student-sidebar :: sidebar}"></div>
  <main class="dashboard-main">
    <div class="dashboard-header">
      <h1 class="dashboard-title">Scan Book</h1>
      <p class="dashboard-subtitle">Scan or type a barcode to find a book</p>
    </div>

    <div id="flash" class="alert d-none"></div>

    <div id="bookCard" class="card-lib p-3 mb-3 d-none">
      <div class="d-flex align-items-center gap-3">
        <div class="bg-success bg-opacity-10 rounded-3 d-flex align-items-center justify-content-center" style="width:64px;height:64px;">
          <i class="bi bi-book fs-2 text-success"></i>
        </div>
        <div class="flex-grow-1">
          <h5 class="mb-1 fw-bold" id="cardTitle">Book Title</h5>
          <p class="mb-1 text-muted" id="cardAuthor">Author</p>
          <span class="badge" id="cardStatus">Available</span>
        </div>
        <a th:href="@{/books/0}" id="cardLink" class="btn btn-accent">
          <i class="bi bi-eye me-1"></i>View Book
        </a>
      </div>
    </div>

    <div class="row g-3">
      <div class="col-lg-6">
        <div class="card-lib p-3">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h2 class="h6 mb-0"><i class="bi bi-camera me-1"></i>Camera</h2>
            <button type="button" class="btn btn-sm btn-outline-secondary" id="btnRestart">Restart</button>
          </div>
          <div id="reader" style="width:100%; aspect-ratio:1/1; background:#f8fafc; border-radius:12px; border:1px dashed #cbd5e1; overflow:hidden;"></div>
          <p class="small text-muted mt-2 mb-0" id="status">Allow camera access to scan...</p>
        </div>
      </div>

      <div class="col-lg-6">
        <div class="manual-entry-card">
          <h3><i class="bi bi-pencil-square me-2" style="color:#22c55e;"></i>Manual Lookup</h3>
          <p class="text-muted">Type a barcode number to look up a book manually.</p>

          <div class="manual-input-group">
            <label>Barcode / QR Code</label>
            <input class="form-control" id="manualBarcode" placeholder="Enter barcode or BOOK:ID"/>
          </div>

          <button type="button" class="btn btn-accent w-100" id="btnBarcode" style="border-radius:10px;">
            <i class="bi bi-upc-scan me-1"></i>Lookup
          </button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const statusEl = document.getElementById('status');
  const flashEl = document.getElementById('flash');
  let html5QrCode = null;
  let lastScannedCode = '';
  let lastScanTime = 0;
  const SCAN_COOLDOWN_MS = 2500;

  function showFlash(kind, msg) {
    flashEl.classList.remove('d-none', 'alert-success', 'alert-danger', 'alert-info');
    flashEl.classList.add(kind === 'success' ? 'alert-success' : (kind === 'error' ? 'alert-danger' : 'alert-info'));
    flashEl.textContent = msg;
  }

  function goBook(id) {
    window.location.href = '/books/' + id;
  }

  function showBookCard(book) {
    document.getElementById('cardTitle').textContent = book.title;
    document.getElementById('cardAuthor').textContent = book.author || 'Unknown Author';
    const statusBadge = document.getElementById('cardStatus');
    if (book.isAvailable) {
      statusBadge.className = 'badge bg-success';
      statusBadge.textContent = book.availableCopies + ' copy(s) available';
    } else {
      statusBadge.className = 'badge bg-danger';
      statusBadge.textContent = 'Not available';
    }
    document.getElementById('cardLink').href = '/books/' + book.bookId;
    document.getElementById('bookCard').classList.remove('d-none');
  }

  function parseBookQr(text) {
    const t = String(text).trim();
    if (t.toUpperCase().startsWith('BOOK:')) {
      return t.substring('BOOK:'.length).trim();
    }
    return null;
  }

  async function lookupBook(code) {
    statusEl.textContent = 'Looking up...';

    const r = await fetch('/api/lookup/any?code=' + encodeURIComponent(code));
    if (!r.ok) { showFlash('error', 'Book not found.'); statusEl.textContent = 'Not found.'; return; }
    const j = await r.json();
    showFlash('success', 'Found: ' + j.title);
    statusEl.textContent = 'Found: ' + j.title;
    showBookCard(j);
    setTimeout(() => goBook(j.bookId), 1200);
  }

  document.getElementById('btnBarcode').onclick = () => {
    const v = document.getElementById('manualBarcode').value.trim();
    if (v) lookupBook(v);
  };

  document.getElementById('manualBarcode').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
      const v = document.getElementById('manualBarcode').value.trim();
      if (v) lookupBook(v);
    }
  });

  function cameraErrorMessage(err) {
    const name = err && (err.name || err);
    const msg = String(err && err.message ? err.message : err || '');
    if (name === 'NotAllowedError' || msg.includes('Permission')) {
      return 'Camera permission denied. Allow camera access in the browser, then tap Restart.';
    }
    if (name === 'NotFoundError' || msg.toLowerCase().includes('no camera')) {
      return 'No camera found on this device.';
    }
    if (name === 'NotReadableError' || msg.toLowerCase().includes('could not start')) {
      return 'Camera is busy (used by another app). Close other camera apps, then Restart.';
    }
    if (!window.isSecureContext) {
      return 'Camera needs HTTPS. Open the site via https://';
    }
    return 'Camera error: ' + msg;
  }

  async function resolveCameraConfig() {
    try {
      const cameras = await Html5Qrcode.getCameras();
      if (cameras && cameras.length) {
        const backCamera = cameras.find(c => {
          const label = (c.label || '').toLowerCase();
          return label.includes('back') || label.includes('environment') || label.includes('rear');
        });
        return backCamera ? backCamera.id : cameras[0].id;
      }
    } catch (e) {
      console.warn('getCameras failed, falling back to facingMode', e);
    }
    return { facingMode: 'environment' };
  }

  async function startScanner() {
    statusEl.textContent = 'Initializing camera...';

    if (typeof Html5Qrcode === 'undefined') {
      statusEl.textContent = 'Scanner library failed to load. Refresh the page.';
      showFlash('error', 'Scanner library blocked or offline. Refresh and try again.');
      return;
    }

    if (!window.isSecureContext) {
      statusEl.textContent = 'Camera needs HTTPS.';
      showFlash('error', 'Open this page using https:// so the camera can start.');
      return;
    }

    if (html5QrCode) {
      try { await html5QrCode.stop(); } catch (e) {}
      try { html5QrCode.clear(); } catch (e) {}
      html5QrCode = null;
    }

    const reader = document.getElementById('reader');
    reader.innerHTML = '';

    html5QrCode = new Html5Qrcode('reader');
    lastScannedCode = '';
    lastScanTime = 0;

    try {
      const cameraConfig = await resolveCameraConfig();
      await html5QrCode.start(
        cameraConfig,
        { fps: 10, qrbox: { width: 220, height: 220 }, aspectRatio: 1.0 },
        (decodedText) => {
          const now = Date.now();
          if (decodedText === lastScannedCode && (now - lastScanTime) < SCAN_COOLDOWN_MS) {
            return;
          }
          lastScannedCode = decodedText;
          lastScanTime = now;
          statusEl.textContent = 'Scanned: ' + decodedText;
          lookupBook(decodedText);
          html5QrCode.stop().catch(() => {});
        },
        () => {}
      );
      statusEl.textContent = 'Camera ready. Point at QR/barcode...';
    } catch (e) {
      console.error('Scanner error:', e);
      // Last resort: try default facingMode if device id failed
      try {
        await html5QrCode.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 220, height: 220 } },
          (decodedText) => {
            lastScannedCode = decodedText;
            lastScanTime = Date.now();
            statusEl.textContent = 'Scanned: ' + decodedText;
            lookupBook(decodedText);
            html5QrCode.stop().catch(() => {});
          },
          () => {}
        );
        statusEl.textContent = 'Camera ready. Point at QR/barcode...';
      } catch (e2) {
        console.error('Scanner fallback error:', e2);
        statusEl.textContent = cameraErrorMessage(e2);
        showFlash('error', cameraErrorMessage(e2));
      }
    }
  }

  document.getElementById('btnRestart').onclick = () => startScanner();

  startScanner();
</script>
<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/student-sidebar :: sidebar-script}"></div>
</body>
</html>
