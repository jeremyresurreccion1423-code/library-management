<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Forgot password')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container pb-5" style="max-width: 420px;">
  <div class="card-lib p-4">
    <h2 class="h4 mb-3">Recover password</h2>
    <p class="small text-muted-lib" th:if="${otpRequired == null}">Enter your username or email. An OTP will be sent to your email.</p>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

    
    <form th:action="@{/forgot-password}" method="post" th:if="${otpRequired == null}" class="sl-validate">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <div class="mb-3">
        <label class="form-label">Username or email</label>
        <input class="form-control" name="emailOrUsername" required/>
      </div>
      <button type="submit" class="btn btn-accent w-100">Send OTP</button>
    </form>

    
    <form th:action="@{/forgot-password}" method="post" th:if="${otpRequired != null}" class="sl-validate confirm-action"
          data-confirm-message="Reset your password with this OTP?">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="emailOrUsername" th:value="${emailOrUsername}"/>

      <div class="alert alert-warning mb-3">
        <i class="bi bi-shield-lock me-2"></i>
        OTP sent! Check your email. Valid for 5 minutes.
      </div>

      <div class="mb-3">
        <label class="form-label">Enter OTP Code</label>
        <input class="form-control" type="text" name="otp" required maxlength="6" placeholder="123456"/>
      </div>

      <div class="mb-3">
        <label class="form-label">New Password</label>
        <input class="form-control" type="password" name="newPassword" required minlength="8"
               pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()\-_=+\[\]{};:'\",.<>/?]).{8,}$"
               title="Must include uppercase, lowercase, number, and special character"/>
        <small class="form-text text-muted">Min 8 chars with uppercase, lowercase, number & special char</small>
      </div>

      <button type="submit" class="btn btn-accent w-100">Reset Password</button>
      <a th:href="@{/forgot-password}" class="btn btn-outline-light w-100 mt-2">Cancel</a>
    </form>
  </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
