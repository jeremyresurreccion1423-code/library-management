<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Super Admin page shell — mirrors Library Admin layout structure, purple theme -->
<th:block th:fragment="shell(pageTitle, heading, subheading, content)">
  <head th:replace="~{layouts/superadmin-layout :: head(${pageTitle})}"></head>
  <body class="sa-dashboard-body">
  <div class="sa-dashboard-wrapper">
    <div th:replace="~{fragments/superadmin-sidebar :: chrome}"></div>
    <main class="sa-dashboard-main">
      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
      <div th:if="${warning}" class="alert alert-warning" th:text="${warning}"></div>

      <div class="sa-page-header" th:if="${heading != null and !heading.isEmpty()}">
        <h1 class="sa-dashboard-title" th:text="${heading}">Page</h1>
        <p class="sa-dashboard-subtitle" th:if="${subheading != null}" th:text="${subheading}">Subtitle</p>
      </div>

      <th:block th:replace="${content}"></th:block>
    </main>
  </div>
  <div th:replace="~{layouts/superadmin-layout :: scripts}"></div>
  </body>
</th:block>
</body>
</html>
