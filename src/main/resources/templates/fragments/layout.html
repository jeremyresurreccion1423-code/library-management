<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head (pageTitle)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}"/>
  <title th:text="${pageTitle}">Smart Library</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/style.css(v=ams-layout-5)}" rel="stylesheet"/>
  <link th:href="@{/css/book-cards.css(v=1)}" rel="stylesheet"/>
  <link th:href="@{/css/admin-portal.css(v=11)}" rel="stylesheet"/>
  <link th:href="@{/css/profile-photo.css}" rel="stylesheet"/>
  <link th:href="@{/css/profile-widget.css(v=7)}" rel="stylesheet"/>
  <link th:href="@{/css/profile-dashboard.css(v=7)}" rel="stylesheet"/>
</head>
<body>
<th:block th:fragment="navbar">
<nav class="navbar navbar-expand-lg navbar-modern mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}" sec:authorize="!isAuthenticated()">
      <i class="bi bi-book-half me-2"></i>Smart Library
    </a>
    <a class="navbar-brand fw-bold" th:href="@{/search}" sec:authorize="isAuthenticated()">
      <i class="bi bi-book-half me-2"></i>Smart Library
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:href="@{/search}"><i class="bi bi-search me-1"></i>Search</a>
        </li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <a class="nav-link" th:href="@{/scan}"><i class="bi bi-qr-code-scan me-1"></i>Scan</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('STUDENT')">
          <a class="nav-link" th:href="@{/student}"><i class="bi bi-collection me-1"></i>My Library</a>
        </li>
        <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/admin}">Admin</a></li>
      </ul>
      <ul class="navbar-nav">
        <li class="nav-item" sec:authorize="!isAuthenticated()">
          <a class="nav-link" th:href="@{/login}">Login</a></li>
        <li class="nav-item" sec:authorize="!isAuthenticated()">
          <a class="nav-link" th:href="@{/register}">Register</a></li>
        <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
          <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" data-bs-toggle="dropdown">
            <div class="avatar-circle me-2">
              <i class="bi bi-person-fill"></i>
            </div>
            <span sec:authentication="name">User</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-end">
            
            <li sec:authorize="hasRole('STUDENT')"><a class="dropdown-item" th:href="@{/student/profile}"><i class="bi bi-person me-2"></i>My Profile</a></li>
            <li sec:authorize="hasRole('STUDENT')"><a class="dropdown-item" th:href="@{/student}"><i class="bi bi-journal-bookmark me-2"></i>Borrowed Books</a></li>
            <li sec:authorize="hasRole('STUDENT')"><a class="dropdown-item" th:href="@{/student}"><i class="bi bi-clock-history me-2"></i>History</a></li>
            <li sec:authorize="hasRole('STUDENT')"><a class="dropdown-item" th:href="@{/student/account/password}"><i class="bi bi-shield-lock me-2"></i>Change Password</a></li>
            
            <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item" th:href="@{/admin}"><i class="bi bi-person me-2"></i>My Profile</a></li>
            <li sec:authorize="hasRole('ADMIN')"><a class="dropdown-item" th:href="@{/admin/account/password}"><i class="bi bi-shield-lock me-2"></i>Change Password</a></li>
            <li><hr class="dropdown-divider"></li>
            <li>
              <button type="button" class="dropdown-item text-danger" id="logoutBtn">
                <i class="bi bi-box-arrow-right me-2"></i>Logout
              </button>
              <form th:action="@{/logout}" method="post" id="logoutForm" style="display: none;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              </form>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>
</th:block>
<th:block th:fragment="back-button">
  <a href="javascript:history.back()" class="btn btn-sm btn-secondary mb-3">← Back</a>
</th:block>


<th:block th:fragment="scripts">
  <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="confirmModalLabel">Confirm Action</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <p id="confirmModalMessage">Are you sure you want to proceed with this action?</p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="confirmModalButton">Confirm</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/forms.js}"></script>
</th:block>
</body>
</html>
