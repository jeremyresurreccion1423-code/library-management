<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<nav th:fragment="subnav" class="admin-subnav mb-4" aria-label="Admin navigation">
  <a class="admin-subnav-link" data-nav-prefix="/admin" data-nav-exact="true" th:href="@{/admin}">Dashboard</a>
  <a class="admin-subnav-link" data-nav-prefix="/admin/categories" th:href="@{/admin/categories}">Categories</a>
  <a class="admin-subnav-link" data-nav-prefix="/admin/authors" th:href="@{/admin/authors}">Authors</a>
  <a class="admin-subnav-link" data-nav-prefix="/admin/books" th:href="@{/admin/books}">Books</a>
  <a class="admin-subnav-link" data-nav-prefix="/admin/scan-issue" th:href="@{/admin/scan-issue}">Scan & Issue</a>
  <a class="admin-subnav-link" data-nav-prefix="/admin/students" th:href="@{/admin/students}">Students</a>
  <a class="admin-subnav-link" data-nav-prefix="/admin/analytics" th:href="@{/admin/analytics}">Analytics</a>
</nav>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const currentPath = window.location.pathname;
    document.querySelectorAll('.admin-subnav-link').forEach(function (link) {
      const prefix = link.dataset.navPrefix || '';
      const exact = link.dataset.navExact === 'true';
      const isActive = exact ? currentPath === prefix : currentPath.startsWith(prefix);
      if (isActive) {
        link.classList.add('active');
      }
    });
  });
</script>
</body>
</html>
