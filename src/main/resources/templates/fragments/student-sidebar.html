<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="sidebar">
<link rel="stylesheet" th:href="@{/css/student-premium.css(v=1)}">

<div class="dashboard-header-bar">
  <div class="header-bar-left">
    <button type="button" class="header-bar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
      <i class="bi bi-list"></i>
    </button>
    <a th:href="@{/}" class="header-bar-brand">
      <i class="bi bi-book-half"></i>
      <span>EDULIBRARY</span>
    </a>
  </div>
  <div class="header-bar-right">
    <div th:replace="~{fragments/profile-widget :: widget(photoAction=@{/student/profile/photo}, passwordAction=@{/student/account/password}, roleLabel='Student', panelId='student-profile-panel', logoutMode='student')}"></div>
  </div>
</div>

<aside class="admin-sidebar" id="studentSidebar" aria-label="Student sidebar navigation">
  <div class="sidebar-header">
    <a th:href="@{/}" class="sidebar-brand">
      <i class="bi bi-book-half"></i>
      <span>EDULIBRARY</span>
    </a>
  </div>
  <nav class="sidebar-nav">
    <a class="sidebar-link" data-nav-prefix="/student" data-nav-exact="true" th:href="@{/student}">
      <i class="bi bi-speedometer2"></i>
      <span>My Dashboard</span>
    </a>
    <a class="sidebar-link" data-nav-prefix="/books-categories" th:href="@{/books-categories}">
      <i class="bi bi-grid-3x3-gap"></i>
      <span>Books & Categories</span>
    </a>
    <a class="sidebar-link" data-nav-prefix="/search" th:href="@{/search}">
      <i class="bi bi-search"></i>
      <span>Search Books</span>
    </a>
    <a class="sidebar-link" data-nav-prefix="/scan" th:href="@{/scan}">
      <i class="bi bi-qr-code-scan"></i>
      <span>Scan Book</span>
    </a>
  </nav>
</aside>


<div class="modal fade" id="studentLogoutModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content" style="background:#fff;border:none;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
      <div class="modal-body text-center p-4">
        <div class="mb-3">
          <i class="bi bi-exclamation-triangle" style="font-size:2.5rem;color:#f59e0b;"></i>
        </div>
        <h5 class="mb-2" style="color:#1f2937;font-weight:600;">Confirm Logout</h5>
        <p class="mb-4" style="color:#6b7280;">Are you sure you want to logout?</p>
        <div class="d-flex justify-content-center gap-2">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="border-radius:10px;padding:8px 20px;">Cancel</button>
          <form th:action="@{/logout}" method="post" class="d-inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-danger" style="border-radius:10px;padding:8px 20px;background:linear-gradient(135deg,#ef4444,#dc2626);border:none;">Logout</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</th:block>

<script th:fragment="sidebar-script">
  window.closeAllProfileMenus = function () {
    document.querySelectorAll('.profile-menu').forEach(function (menu) { menu.classList.remove('show'); });
    document.querySelectorAll('.profile-panel').forEach(function (panel) { panel.classList.remove('show'); });
  };
  window.toggleProfileMenu = function (button) {
    const widget = button.closest('.page-header-profile-widget');
    const menu = widget ? widget.querySelector('.profile-menu') : null;
    if (!menu) return;
    const shouldOpen = !menu.classList.contains('show');
    window.closeAllProfileMenus();
    if (shouldOpen) menu.classList.add('show');
  };
  window.toggleProfilePanel = function (panelId) {
    window.closeAllProfileMenus();
    const panel = document.getElementById(panelId);
    if (panel) panel.classList.add('show');
  };
  document.addEventListener('click', function (event) {
    if (!event.target.closest('.page-header-profile-widget')) {
      window.closeAllProfileMenus();
    }
  });

  // Active nav highlighting
  document.addEventListener('DOMContentLoaded', function () {
    const currentPath = window.location.pathname;
    document.querySelectorAll('.sidebar-link').forEach(function (link) {
      const prefix = link.dataset.navPrefix || '';
      const exact = link.dataset.navExact === 'true';
      const isActive = exact ? currentPath === prefix : currentPath.startsWith(prefix);
      if (isActive) {
        link.classList.add('active');
      }
    });
  });

  // Logout modal
  function showStudentLogoutModal() {
    const modal = new bootstrap.Modal(document.getElementById('studentLogoutModal'));
    modal.show();
  }

  // Toggle sidebar
  function toggleSidebar() {
    const sidebar = document.getElementById('studentSidebar');
    const main = document.querySelector('.dashboard-main');
    sidebar.classList.toggle('collapsed');
    if (main) main.classList.toggle('expanded');
  }

  // Close sidebar when clicking outside on mobile
  document.addEventListener('click', function(e) {
    const sidebar = document.getElementById('studentSidebar');
    const toggle = document.querySelector('.header-bar-toggle');
    if (sidebar && !sidebar.classList.contains('collapsed') && window.innerWidth < 992) {
      if (!sidebar.contains(e.target) && e.target !== toggle && !toggle.contains(e.target)) {
        sidebar.classList.add('collapsed');
        const main = document.querySelector('.dashboard-main');
        if (main) main.classList.add('expanded');
      }
    }
  });
</script>
</body>
</html>
