<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!-- Dedicated Super Admin shell — isolated from Admin portal styles -->
<head th:fragment="head(pageTitle)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}"/>
  <title th:text="${pageTitle}">System Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin=""/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link th:href="@{/css/superadmin.css(v=1)}" rel="stylesheet"/>
</head>

<th:block th:fragment="sidebar">
  <aside class="sa-sidebar" id="saSidebar" aria-label="Super Admin navigation">
    <div class="sa-sidebar__brand">
      <a th:href="@{/super-admin}" class="sa-sidebar__logo">
        <span class="sa-sidebar__logo-icon"><i data-lucide="shield-check"></i></span>
        <span class="sa-sidebar__logo-text">
          <strong>EduLibrary</strong>
          <small>System Control</small>
        </span>
      </a>
    </div>

    <div class="sa-sidebar__scroll">
      <nav class="sa-sidebar__nav">
        <p class="sa-sidebar__label">Overview</p>
        <a class="sa-nav-link" th:href="@{/super-admin}" th:classappend="${navDashboardActive} ? ' sa-nav-link--active'">
          <i data-lucide="layout-dashboard"></i>
          <span>Dashboard</span>
        </a>
        <a class="sa-nav-link" th:href="@{/super-admin/security}" th:classappend="${navSecurityActive} ? ' sa-nav-link--active'">
          <i data-lucide="shield"></i>
          <span>Security Center</span>
        </a>

        <p class="sa-sidebar__label">Library Module</p>

        <div class="sa-nav-group" th:classappend="${navLibOpen} ? ' sa-nav-group--open'" id="saGroupLibrary">
          <button type="button" class="sa-nav-group__btn" onclick="saToggleGroup('saGroupLibrary')"
                  th:attr="aria-expanded=${navLibOpen}">
            <span class="sa-nav-group__label">
              <i data-lucide="book-open"></i>
              <span>Library</span>
            </span>
            <i data-lucide="chevron-down" class="sa-nav-group__chevron"></i>
          </button>
          <ul class="sa-nav-group__panel">
            <li><a class="sa-sublink" data-nav-prefix="/admin" data-nav-exact="true" th:href="@{/admin}">Dashboard</a></li>
            <li><a class="sa-sublink" data-nav-prefix="/admin/categories" th:href="@{/admin/categories}">Categories</a></li>
            <li><a class="sa-sublink" data-nav-prefix="/admin/authors" th:href="@{/admin/authors}">Authors</a></li>
            <li><a class="sa-sublink" data-nav-prefix="/admin/books" th:href="@{/admin/books}">Books</a></li>
            <li><a class="sa-sublink" data-nav-prefix="/admin/scan-issue" th:href="@{/admin/scan-issue}">Scan &amp; Issue</a></li>
            <li><a class="sa-sublink" data-nav-prefix="/admin/issues" data-nav-exclude="/admin/issues/reservations" th:href="@{/admin/issues}">Issue / Return</a></li>
            <li><a class="sa-sublink" data-nav-prefix="/admin/issues/reservations" th:href="@{/admin/issues/reservations}">Reservations</a></li>
            <li><a class="sa-sublink" data-nav-prefix="/admin/students" th:href="@{/admin/students}">Students</a></li>
            <li><a class="sa-sublink" data-nav-prefix="/admin/analytics" th:href="@{/admin/analytics}">Analytics</a></li>
            <li><a class="sa-sublink" data-nav-prefix="/admin/admins" th:href="@{/admin/admins}">Admins</a></li>
          </ul>
        </div>
      </nav>
    </div>

    <div class="sa-sidebar__footer">
      <div class="sa-sidebar__status">
        <i data-lucide="activity"></i>
        <span>Library Control Center</span>
      </div>
    </div>
  </aside>
  <div class="sa-sidebar-backdrop" id="saSidebarBackdrop" onclick="saCloseSidebar()"></div>
</th:block>

<th:block th:fragment="topbar(title, subtitle)">
  <header class="sa-topbar">
    <div class="sa-topbar__left">
      <button type="button" class="sa-topbar__toggle" onclick="saToggleSidebar()" aria-label="Toggle menu">
        <i data-lucide="menu"></i>
      </button>
      <div class="sa-topbar__titles">
        <h1 class="sa-topbar__title" th:text="${title}">Dashboard</h1>
        <p class="sa-topbar__subtitle" th:if="${subtitle != null}" th:text="${subtitle}">Overview</p>
      </div>
    </div>
    <div class="sa-topbar__right">
      <div class="sa-profile-widget">
        <div th:replace="~{fragments/profile-widget :: widget(photoAction=@{/admin/profile/photo}, passwordAction=@{/admin/account/password}, roleLabel='Super Admin', panelId='sa-profile-panel', logoutMode='super-admin')}"></div>
      </div>
    </div>
  </header>
</th:block>

<th:block th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script th:src="@{/js/forms.js}"></script>
  <script>
    window.saToggleGroup = function (groupId) {
      const group = document.getElementById(groupId);
      if (!group) return;
      group.classList.toggle('sa-nav-group--open');
      const btn = group.querySelector('.sa-nav-group__btn');
      if (btn) btn.setAttribute('aria-expanded', group.classList.contains('sa-nav-group--open') ? 'true' : 'false');
    };

    window.saToggleSidebar = function () {
      document.body.classList.toggle('sa-sidebar-collapsed');
      document.body.classList.toggle('sa-sidebar-mobile-open');
    };

    window.saCloseSidebar = function () {
      document.body.classList.remove('sa-sidebar-mobile-open');
    };

    window.closeAllProfileMenus = window.closeAllProfileMenus || function () {
      document.querySelectorAll('.profile-menu').forEach(function (m) { m.classList.remove('show'); });
      document.querySelectorAll('.profile-panel').forEach(function (p) { p.classList.remove('show'); });
    };

    window.toggleProfileMenu = window.toggleProfileMenu || function (button) {
      const widget = button.closest('.page-header-profile-widget');
      const menu = widget ? widget.querySelector('.profile-menu') : null;
      if (!menu) return;
      const shouldOpen = !menu.classList.contains('show');
      window.closeAllProfileMenus();
      if (shouldOpen) menu.classList.add('show');
    };

    document.addEventListener('click', function (e) {
      if (!e.target.closest('.page-header-profile-widget')) {
        window.closeAllProfileMenus();
      }
    });

    document.addEventListener('DOMContentLoaded', function () {
      if (window.lucide) lucide.createIcons();

      const currentPath = window.location.pathname;
      document.querySelectorAll('.sa-sublink').forEach(function (link) {
        const prefix = link.dataset.navPrefix || '';
        if (!prefix) return;
        const exact = link.dataset.navExact === 'true';
        const exclude = link.dataset.navExclude || '';
        if (exclude && currentPath.startsWith(exclude)) return;
        const isActive = exact ? currentPath === prefix : currentPath.startsWith(prefix);
        if (isActive) {
          link.classList.add('sa-sublink--active');
          const group = link.closest('.sa-nav-group');
          if (group) {
            group.classList.add('sa-nav-group--open');
            const btn = group.querySelector('.sa-nav-group__btn');
            if (btn) btn.setAttribute('aria-expanded', 'true');
          }
        }
      });

      document.querySelectorAll('.sa-nav-group.sa-nav-group--open .sa-nav-group__btn').forEach(function (btn) {
        btn.setAttribute('aria-expanded', 'true');
      });
    });
  </script>
</th:block>

</body>
</html>
