<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<!--
  Legacy navbar fragment — superseded by fragments/superadmin-sidebar :: chrome (header bar + sidebar).
  Kept for module independence; not referenced by current Super Admin templates.
-->
<header class="sa-header-bar" th:fragment="navbar(title, subtitle)">
  <div class="sa-header-bar-left">
    <button type="button" class="sa-header-bar-toggle" onclick="saToggleSidebar()" aria-label="Toggle sidebar">
      <i class="bi bi-list"></i>
    </button>
    <div class="sa-header-bar-brand">
      <span>
        <span th:text="${title}">Page</span>
        <small class="sa-header-bar-brand-sub" th:if="${subtitle != null}" th:text="${subtitle}">Subtitle</small>
      </span>
    </div>
  </div>
  <div class="sa-header-bar-right">
    <div class="sa-profile-widget">
      <button type="button" class="sa-profile-trigger" onclick="saToggleProfileMenu(this)" aria-haspopup="true" aria-label="My Profile">
        <span class="sa-profile-trigger-avatar">
          <img th:if="${profilePhotoUrl != null}" th:src="${profilePhotoUrl}" alt=""/>
          <span th:unless="${profilePhotoUrl != null}" class="sa-profile-trigger-initial" th:text="${profileInitial ?: 'SA'}">SA</span>
        </span>
        <i class="bi bi-chevron-down sa-profile-caret"></i>
      </button>
    </div>
  </div>
</header>
</body>
</html>
