<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Profile')}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div th:replace="~{fragments/student-sidebar :: sidebar}"></div>
  <main class="dashboard-main">
    <div class="dashboard-header">
      <h1 class="dashboard-title">My Profile</h1>
      <p class="dashboard-subtitle">Manage your personal information</p>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="profile-card profile-form">
      <div class="profile-card-header">
        <div class="profile-avatar">
          <img th:if="${profilePhotoUrl != null}"
               th:src="${profilePhotoUrl}"
               alt="Profile photo"
               class="profile-avatar-img"
               width="72"
               height="72"/>
          <span th:if="${profilePhotoUrl == null}" th:text="${profileInitial ?: 'U'}">U</span>
        </div>
        <div class="profile-info">
          <h4 th:text="${profile.fullName}">Student Name</h4>
          <p th:text="'Student ID: ' + ${profile.studentId}">Student ID</p>
        </div>
      </div>

      <div class="profile-photo-upload mb-4">
        <label class="form-label">Profile Photo</label>
        <form th:action="@{/student/profile/photo}" method="post" enctype="multipart/form-data" class="d-flex flex-wrap gap-2 align-items-center">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <input type="file" name="photo" accept="image/*" class="form-control" style="max-width:320px;" required>
          <button type="submit" class="btn btn-accent btn-sm">
            <i class="bi bi-upload me-1"></i>Upload Photo
          </button>
        </form>
        <div class="form-text text-muted">JPG, PNG, GIF, or WebP. Max 5MB.</div>
      </div>

      <form th:action="@{/student/profile}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input class="form-control" id="fullNameInput" name="fullName" required th:value="${profile.fullName}" pattern="[A-Za-z\s]+" title="Name must contain letters and spaces only"/>
          <div id="fullNameError" class="text-danger small mt-1 d-none">Name must contain letters and spaces only.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Phone</label>
          <input class="form-control" name="phone" th:value="${profile.phone}"/>
        </div>
        <div class="mb-3">
          <label class="form-label">Course</label>
          <input class="form-control" name="course" th:value="${profile.course}"/>
        </div>
        <div class="profile-actions">
          <button type="submit" class="btn btn-accent">
            <i class="bi bi-check-lg me-1"></i>Save Changes
          </button>
          <a class="btn btn-outline-light" th:href="@{/student}">
            <i class="bi bi-arrow-left me-1"></i>Back
          </a>
        </div>
      </form>
    </div>
  </main>
</div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const fullNameInput = document.getElementById('fullNameInput');
    const fullNameError = document.getElementById('fullNameError');
    if (fullNameInput) {
      fullNameInput.addEventListener('input', function() {
        const val = this.value;
        if (!/^[A-Za-z\s]*$/.test(val)) {
          fullNameError.classList.remove('d-none');
          this.classList.add('is-invalid');
        } else {
          fullNameError.classList.add('d-none');
          this.classList.remove('is-invalid');
        }
      });
      fullNameInput.closest('form').addEventListener('submit', function(e) {
        if (!/^[A-Za-z\s]+$/.test(fullNameInput.value.trim())) {
          e.preventDefault();
          fullNameError.classList.remove('d-none');
          fullNameInput.classList.add('is-invalid');
          fullNameInput.focus();
        }
      });
    }
  });
</script>
<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/student-sidebar :: sidebar-script}"></div>
</body>
</html>
