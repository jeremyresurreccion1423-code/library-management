<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Change password')}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div th:replace="~{fragments/student-sidebar :: sidebar}"></div>
  <main class="dashboard-main">
    <div class="dashboard-header">
      <h1 class="dashboard-title">Change Password</h1>
      <p class="dashboard-subtitle">Update your account password</p>
    </div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-info" th:text="${message}"></div>

    <div class="profile-card">
      <div class="profile-card-header">
        <div class="profile-avatar" style="width:56px;height:56px;font-size:1.4rem;">
          <i class="bi bi-shield-lock"></i>
        </div>
        <div class="profile-info">
          <h4>Security Settings</h4>
          <p>Update your password</p>
        </div>
      </div>

      
      <form th:action="@{/student/account/password}" method="post" th:if="${otpRequired == null}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <div class="mb-3">
          <label class="form-label">Current Password</label>
          <input class="form-control" id="currentPassword" type="password" name="currentPassword" required/>
        </div>
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input class="form-control" id="newPassword" type="password" name="newPassword" required minlength="8"
                 title="Password must be at least 8 characters"/>
          <small class="form-text text-muted">Password must be at least 8 characters</small>
        </div>
        <div class="mb-3 form-check">
          <input class="form-check-input" type="checkbox" id="toggleStudentPasswords"/>
          <label class="form-check-label" for="toggleStudentPasswords">Show passwords</label>
        </div>
        <div class="profile-actions">
          <button class="btn btn-accent" type="submit">
            <i class="bi bi-envelope me-1"></i>Send OTP
          </button>
          <a class="btn btn-outline-light" th:href="@{/student}">
            <i class="bi bi-arrow-left me-1"></i>Back
          </a>
        </div>
      </form>

      
      <form th:action="@{/student/account/password}" method="post" th:if="${otpRequired != null}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" name="currentPassword" value="verified"/>
        <input type="hidden" name="newPassword" th:value="${newPassword}"/>

        <div class="alert alert-warning">
          <i class="bi bi-shield-lock me-2"></i>
          OTP sent to <strong th:text="${email}"></strong>. Valid for 5 minutes.
        </div>

        <div class="mb-3">
          <label class="form-label">Enter OTP Code</label>
          <input class="form-control" type="text" name="otp" required maxlength="6" placeholder="123456"/>
        </div>

        <div class="profile-actions">
          <button class="btn btn-accent" type="submit">
            <i class="bi bi-check-lg me-1"></i>Verify & Update
          </button>
          <a class="btn btn-outline-light" th:href="@{/student/account/password}">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>
<div th:replace="~{fragments/layout :: scripts}"></div>
<div th:replace="~{fragments/student-sidebar :: sidebar-script}"></div>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const currentInput = document.getElementById('currentPassword');
    const newInput = document.getElementById('newPassword');
    const toggle = document.getElementById('toggleStudentPasswords');
    if (!currentInput || !newInput || !toggle) return;
    toggle.addEventListener('change', function () {
      const inputType = this.checked ? 'text' : 'password';
      currentInput.type = inputType;
      newInput.type = inputType;
    });
  });
</script>
</body>
</html>
