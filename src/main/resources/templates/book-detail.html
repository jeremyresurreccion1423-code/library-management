<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(${book.title})}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div sec:authorize="hasRole('ADMIN')" th:replace="~{fragments/admin-sidebar :: sidebar}"></div>
  <div sec:authorize="hasRole('STUDENT')" th:replace="~{fragments/student-sidebar :: sidebar}"></div>

  <main class="dashboard-main">
    <div class="dashboard-header">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1 class="dashboard-title" th:text="${book.title}"></h1>
          <p class="dashboard-subtitle" th:if="${book.author != null}" th:text="${book.author.name}"></p>
        </div>
        <a class="btn btn-outline-secondary" sec:authorize="hasRole('STUDENT')" th:href="@{/books-categories}">
          <i class="bi bi-arrow-left me-1"></i>Back to Books
        </a>
        <a class="btn btn-outline-secondary" sec:authorize="hasRole('ADMIN')" th:href="@{/admin/books}">
          <i class="bi bi-arrow-left me-1"></i>Back to Books
        </a>
      </div>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card-lib p-3 mb-3">
          <h6 class="mb-3 text-muted-lib"><i class="bi bi-info-circle me-2"></i>Details</h6>
          <div class="row g-2">
            <div class="col-sm-6"><strong>Author:</strong> <span th:text="${book.author != null ? book.author.name : '—'}"></span></div>
            <div class="col-sm-6"><strong>Category:</strong> <span th:text="${book.category != null ? book.category.name : '—'}"></span></div>
            <div class="col-sm-6"><strong>ISBN:</strong> <span th:text="${book.isbn != null ? book.isbn : '—'}"></span></div>
            <div class="col-sm-6"><strong>Barcode:</strong> <span th:text="${book.barcode != null ? book.barcode : '—'}"></span></div>
            <div class="col-sm-6"><strong>Available:</strong> <span th:text="${book.availableCopies + ' of ' + book.totalCopies}"></span></div>
          </div>
        </div>

        <div sec:authorize="hasRole('ADMIN')" th:if="${ebook != null}" class="mt-4">
          <div class="card-lib p-3" style="background:#1a1a2e;border-radius:12px;">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h6 class="mb-0 text-white"><i class="bi bi-file-earmark-pdf me-2 text-success"></i>Book PDF</h6>
              <a class="btn btn-sm btn-outline-light" th:href="@{/ebook/read/{id}(id=${book.id})}" target="_blank">
                <i class="bi bi-box-arrow-up-right me-1"></i>Open in new tab
              </a>
            </div>
            <iframe th:src="@{/ebook/file/{id}(id=${book.id})}" title="PDF" class="w-100 border-0"
                    style="min-height:500px;background:#fff;border-radius:8px;"></iframe>
          </div>
        </div>

        <div sec:authorize="hasRole('STUDENT')" class="mt-3">
          <div th:if="${book.availableCopies > 0}">
            <button type="button" th:attr="data-book-id=${book.id}" class="btn btn-accent borrow-book-btn">Borrow Book</button>
            <span class="small text-muted-lib ms-2">Available for borrowing</span>
          </div>
          <div th:if="${book.availableCopies == 0}">
            <button type="button" th:attr="data-book-id=${book.id}" class="btn btn-accent join-queue-btn">Join reservation queue</button>
            <span class="small text-muted-lib ms-2">No available copies — join queue</span>
          </div>
        </div>
        <div sec:authorize="hasRole('ADMIN')" class="mt-3">
          <a class="btn btn-accent" th:href="@{/admin/issues(bookId=${book.id})}">
            <i class="bi bi-journal-plus me-1"></i>Issue book
          </a>
        </div>
      </div>

      <div class="col-lg-4">
        <div class="card-lib p-3 text-center">
          <h6 class="text-muted-lib mb-2"><i class="bi bi-qr-code me-1"></i>QR Code</h6>
          <img th:src="@{/api/books/{id}/qr.png(id=${book.id})}" alt="QR" class="img-fluid" style="max-width:220px"/>
          <p class="small text-muted-lib mt-2 mb-0" th:text="${book.qrPayload}"></p>
        </div>
      </div>
    </div>
  </main>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<div sec:authorize="hasRole('ADMIN')" th:replace="~{fragments/admin-sidebar :: sidebar-script}"></div>
<div sec:authorize="hasRole('STUDENT')" th:replace="~{fragments/student-sidebar :: sidebar-script}"></div>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const borrowButton = document.querySelector('.borrow-book-btn');
    if (borrowButton) {
      borrowButton.addEventListener('click', function() {
        const bookId = this.getAttribute('data-book-id');
        const bookTitle = document.querySelector('.dashboard-title').textContent;
        if (typeof confirmAction === 'function') {
          confirmAction('Are you sure you want to borrow "' + bookTitle + '"?', function() { submitBorrowForm(bookId); });
        } else if (confirm('Are you sure you want to borrow "' + bookTitle + '"?')) {
          submitBorrowForm(bookId);
        }
      });
    }

    const joinQueueButton = document.querySelector('.join-queue-btn');
    if (joinQueueButton) {
      joinQueueButton.addEventListener('click', function() {
        const bookId = this.getAttribute('data-book-id');
        const bookTitle = document.querySelector('.dashboard-title').textContent;
        if (typeof confirmAction === 'function') {
          confirmAction('Join the reservation queue for "' + bookTitle + '"?', function() { submitReservationForm(bookId); });
        } else if (confirm('Join the reservation queue for "' + bookTitle + '"?')) {
          submitReservationForm(bookId);
        }
      });
    }

    function submitBorrowForm(bookId) {
      const form = document.createElement('form');
      form.method = 'post';
      form.action = '/student/borrow';
      const inp = document.createElement('input'); inp.type = 'hidden'; inp.name = 'bookId'; inp.value = bookId; form.appendChild(inp);
      const csrf = document.querySelector('meta[name="_csrf"]');
      if (csrf) { const c = document.createElement('input'); c.type = 'hidden'; c.name = '_csrf'; c.value = csrf.getAttribute('content'); form.appendChild(c); }
      document.body.appendChild(form); form.submit();
    }

    function submitReservationForm(bookId) {
      const form = document.createElement('form');
      form.method = 'post';
      form.action = '/student/reservations/add';
      const inp = document.createElement('input'); inp.type = 'hidden'; inp.name = 'bookId'; inp.value = bookId; form.appendChild(inp);
      const csrf = document.querySelector('meta[name="_csrf"]');
      if (csrf) { const c = document.createElement('input'); c.type = 'hidden'; c.name = '_csrf'; c.value = csrf.getAttribute('content'); form.appendChild(c); }
      document.body.appendChild(form); form.submit();
    }
  });
</script>
</body>
</html>
