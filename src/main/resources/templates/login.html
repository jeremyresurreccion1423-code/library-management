<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title>EduLibrary - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link th:href="@{/css/login-new.css(v=ilearn-style-3)}" rel="stylesheet"/>
</head>
<body data-auth-page="true" class="auth-ilearn">
  <div class="login-split">
    <div class="split-left">
      <div class="brand-watermark" aria-hidden="true">
        <i class="bi bi-book-half"></i>
      </div>
      <div class="logo-area">
        <div class="brand-mark">
          <i class="bi bi-book-half"></i>
        </div>
        <h1 class="brand-name">EduLibrary</h1>
        <p class="brand-tagline">Smart Library System</p>
      </div>
    </div>

    <div class="split-right">
      <div class="login-card floating">
        <h2 class="welcome-title">Welcome to <span class="brand-highlight">EduLibrary</span></h2>
        <p class="welcome-subtitle">Laguna University Learning Management System</p>

        <div class="role-divider">
          <span>COLLEGE STUDENT</span>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger" role="alert" aria-live="polite" th:text="${errorMessage}"></div>
        <div th:if="${success}" class="alert alert-success" role="status" aria-live="polite" th:text="${success}"></div>
        <div th:if="${message}" class="alert alert-info" role="status" aria-live="polite" th:text="${message}"></div>

        <form th:action="@{/login}" method="post" class="login-form sl-validate">
          <div class="form-group">
            <div class="input-wrapper">
              <span class="input-icon"><i class="bi bi-person"></i></span>
              <input type="text" name="username" class="form-input"
                     placeholder="Username, Student ID, or Email"
                     required autocomplete="username"/>
            </div>
          </div>

          <div class="form-group">
            <div class="input-wrapper">
              <span class="input-icon"><i class="bi bi-lock"></i></span>
              <input type="password" name="password" id="password" class="form-input"
                     placeholder="Password"
                     required autocomplete="current-password"/>
              <button type="button" class="toggle-password" id="togglePasswordBtn" aria-label="Show password">
                <i class="bi bi-eye"></i>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-login">LOGIN</button>

          <div class="form-footer">
            <a th:href="@{/forgot-password}" class="forgot-link">Recover My Account</a>
            <a th:href="@{/register}" class="forgot-link-alt">Don't have an account? Register</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script th:src="@{/js/forms.js}"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const passwordInput = document.getElementById('password');
      const btn = document.getElementById('togglePasswordBtn');
      if (!passwordInput || !btn) return;
      btn.addEventListener('click', function () {
        const isHidden = passwordInput.type === 'password';
        passwordInput.type = isHidden ? 'text' : 'password';
        btn.querySelector('i').className = isHidden ? 'bi bi-eye-slash' : 'bi bi-eye';
      });
    });
  </script>
</body>
</html>
