<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head('Search books')}"></head>
<body class="dashboard-body">
<div class="dashboard-wrapper">
  <div sec:authorize="hasRole('STUDENT')" th:replace="~{fragments/student-sidebar :: sidebar}"></div>

  <main class="dashboard-main">
    <div class="dashboard-header">
      <h1 class="dashboard-title">Search Books</h1>
      <p class="dashboard-subtitle">Find books in the library collection</p>
    </div>

    <div class="card-lib p-4 mb-4">
      <form method="get" th:action="@{/search}">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Keyword</label>
            <input class="form-control" name="q" th:value="${q}" placeholder="Search books..."/>
          </div>
          <div class="col-md-3">
            <label class="form-label">ISBN (exact)</label>
            <input class="form-control" name="isbn" th:value="${isbn}" placeholder="978..."/>
          </div>
          <div class="col-md-3">
            <label class="form-label">Author</label>
            <select class="form-select" name="authorId">
              <option value="">Any</option>
              <option th:each="a : ${authors}" th:value="${a.id}" th:text="${a.name}"
                      th:selected="${authorId == a.id}"></option>
            </select>
          </div>
          <div class="col-md-1 d-flex align-items-end">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="availableOnly" value="true" id="av"
                     th:checked="${availableOnly}"/>
              <label class="form-check-label small" for="av">Available</label>
            </div>
          </div>
        </div>
        <div class="row mt-3">
          <div class="col-12 d-flex justify-content-end gap-2">
            <button type="submit" class="btn btn-accent">
              <i class="bi bi-search me-1"></i>Search
            </button>
          </div>
        </div>
      </form>
    </div>

    <div th:if="${#lists.isEmpty(books)}" class="card-lib p-5 text-center text-muted-lib">
      <i class="bi bi-inbox fs-1 d-block mb-2"></i>
      No books found
    </div>

    <div class="books-grid" th:if="${!#lists.isEmpty(books)}">
      <div class="book-card" th:each="b : ${books}">
        <div class="book-card-header">
          <div class="book-icon"><i class="bi bi-book"></i></div>
          <div class="book-status" th:classappend="${b.availableCopies > 0 ? 'available' : 'unavailable'}"
               th:text="${b.availableCopies + '/' + b.totalCopies}"></div>
        </div>
        <div class="book-card-body">
          <h5 class="book-title" th:text="${b.title}">Book Title</h5>
          <div class="book-details">
            <p class="book-isbn" th:if="${b.isbn != null && !b.isbn.isEmpty()}">
              <i class="bi bi-upc"></i><span th:text="${b.isbn}"></span>
            </p>
            <p class="book-author" th:if="${b.author != null}">
              <i class="bi bi-person"></i><span th:text="${b.author.name}"></span>
            </p>
            <p class="book-category" th:if="${b.category != null}">
              <i class="bi bi-folder"></i><span th:text="${b.category.name}"></span>
            </p>
          </div>
        </div>
        <div class="book-card-footer">
          <a class="btn btn-sm btn-outline-primary" th:href="@{/books/{id}(id=${b.id})}">
            <i class="bi bi-eye"></i> Details
          </a>
        </div>
      </div>
    </div>
  </main>
</div>

<div th:replace="~{fragments/layout :: scripts}"></div>
<div sec:authorize="hasRole('STUDENT')" th:replace="~{fragments/student-sidebar :: sidebar-script}"></div>
</body>
</html>
