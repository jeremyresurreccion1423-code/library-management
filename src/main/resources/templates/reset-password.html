<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reset password')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container pb-5" style="max-width: 420px;">
  <div class="card-lib p-4">
    <h2 class="h4 mb-3">New password</h2>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <form th:action="@{/reset-password}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="token" th:value="${token}"/>
      <div class="mb-3">
        <label class="form-label">New password</label>
        <input class="form-control" id="newPassword" type="password" name="password" required minlength="6"/>
        <div class="form-check mt-2">
          <input class="form-check-input" type="checkbox" id="toggleResetPassword"/>
          <label class="form-check-label small" for="toggleResetPassword">Show password</label>
        </div>
      </div>
      <button type="submit" class="btn btn-accent w-100">Update</button>
    </form>
  </div>
</main>
<div th:replace="~{fragments/layout :: scripts}"></div>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    const passwordInput = document.getElementById('newPassword');
    const toggle = document.getElementById('toggleResetPassword');
    if (!passwordInput || !toggle) return;
    toggle.addEventListener('change', function () {
      passwordInput.type = this.checked ? 'text' : 'password';
    });
  });
</script>
</body>
</html>
